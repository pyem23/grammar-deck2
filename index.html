  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  summary{list-style:none;cursor:pointer;outline:none;}\n  summary::-webkit-details-marker{display:none;}\n  details[open] .rv-btn{background:#2F6B3D !important;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"85d20d77-952d-4cd1-a483-041472cd32b4#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<!-- ============ 1. COVER ============ -->\n<section data-label=\"Cover\" data-speaker-notes=\"Selamat datang. Ini materi Level 1 grammar Bahasa Inggris untuk belajar mandiri. Kita akan kupas delapan topik fondasi mulai dari kata sampai tense, ditambah tutorial cara merangkai kalimat yang benar. Santai saja, semua dijelaskan dengan Bahasa Indonesia.\" style=\"position:relative;background:#FBF7EE;background-image:linear-gradient(rgba(60,55,45,0.045) 1px,transparent 1px),linear-gradient(90deg,rgba(60,55,45,0.045) 1px,transparent 1px);background-size:50px 50px;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.16) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 80px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"position:absolute;top:64px;right:74px;background:#fff;border:2px solid #E2574C;color:#C2453B;font-weight:800;font-size:24px;letter-spacing:1px;padding:12px 22px;border-radius:10px;transform:rotate(2deg);box-shadow:0 6px 16px rgba(60,55,45,0.12);\">Belajar Mandiri<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px 80px 172px;\">\n    <div style=\"font-family:'Caveat',cursive;font-size:52px;color:#6B6FD6;line-height:1;margin-bottom:6px;\">selamat datang di<\u002Fdiv>\n    <h1 style=\"font-size:124px;font-weight:800;margin:0;line-height:1.02;letter-spacing:-2px;\">English Grammar<\u002Fh1>\n    <div style=\"position:relative;width:760px;height:20px;margin:8px 0 30px;background:rgba(155,95,192,0.30);border-radius:8px;\"><\u002Fdiv>\n    <div style=\"font-family:'Caveat',cursive;font-size:58px;color:#33302A;\">Level 1 — Fondasi Tata Bahasa Inggris<\u002Fdiv>\n    <p style=\"font-size:30px;color:#7A746A;margin:18px 0 46px;max-width:900px;line-height:1.5;\">Kenali blok-blok dasar bahasa Inggris: dari <strong>kata<\u002Fstrong> sampai <strong>kalimat utuh<\u002Fstrong> — lengkap dengan tabel, tips cepat, dan latihan.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;\">\n      <span style=\"background:#E2574C;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1.5deg);\">Word<\u002Fspan>\n      <span style=\"background:#E8833A;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1deg);\">Phrase<\u002Fspan>\n      <span style=\"background:#C9971A;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1deg);\">Clause<\u002Fspan>\n      <span style=\"background:#2FA0A0;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1.5deg);\">Pronouns<\u002Fspan>\n      <span style=\"background:#3B82C4;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1deg);\">Conjunction<\u002Fspan>\n      <span style=\"background:#6B6FD6;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1deg);\">Adjective Order<\u002Fspan>\n      <span style=\"background:#C1447E;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1deg);\">Adverb<\u002Fspan>\n      <span style=\"background:#4FA15B;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1.5deg);\">Sentence<\u002Fspan>\n      <span style=\"background:#9B5FC0;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1deg);\">Tense<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 1b. BAGAN ALUR PEMAHAMAN ============ -->\n<section data-label=\"Alur Pemahaman\" data-speaker-notes=\"Sebelum masuk daftar isi, pahami gambaran besarnya. Inti memahami bahasa Inggris adalah memahami urutan dari unit terkecil sampai kalimat kompleks. Mulai dari kata—termasuk di dalamnya pronoun, conjunction, dan kelas kata lain. Beberapa kata dirangkai menjadi frasa. Frasa yang sudah punya subjek dan kata kerja menjadi klausa. Lalu klausa-klausa digabung menjadi kalimat, dari yang sederhana sampai kompleks. Ikuti arah panahnya.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:70px 80px 56px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 70px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:20px;\">\n    <div>\n      <span style=\"display:inline-block;background:#33302A;color:#FBF7EE;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1deg);\">GAMBARAN BESAR<\u002Fspan>\n      <h2 style=\"font-size:54px;font-weight:800;margin:12px 0 4px;\">Urutan Memahami Bahasa Inggris<\u002Fh2>\n      <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;\">dari unit terkecil sampai kalimat kompleks<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 26px;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n      <p style=\"font-size:25px;line-height:1.45;margin:0;color:#3D3A33;\">Inti belajar bahasa Inggris adalah memahami <strong>urutan pembentuk kalimat<\u002Fstrong>: kata yang berdiri sendiri dirangkai bertahap hingga menjadi kalimat yang utuh dan kompleks. Inilah peta perjalanannya:<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;gap:8px;\">\n      <!-- WORD -->\n      <div style=\"flex:1;background:#fff;border-radius:18px;border-top:7px solid #E2574C;box-shadow:0 8px 20px rgba(60,55,45,0.1);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E2574C;\">LANGKAH 1<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Word<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;line-height:1.3;\">kata — unit terkecil<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px;\">\n          <span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">noun<\u002Fspan>\n          <span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">verb<\u002Fspan>\n          <span style=\"background:#E0F1F1;color:#1E7878;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">pronoun<\u002Fspan>\n          <span style=\"background:#EAEAFB;color:#4B4FB0;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">conjunction<\u002Fspan>\n          <span style=\"background:#F0EEE6;color:#7A746A;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">dll.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;color:#C9971A;\">\n        <div style=\"font-size:54px;font-weight:800;line-height:0.8;\">→<\u002Fdiv>\n        <div style=\"font-family:'Caveat',cursive;font-size:26px;color:#9A6B12;margin-top:2px;\">dirangkai<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- PHRASE -->\n      <div style=\"flex:1;background:#fff;border-radius:18px;border-top:7px solid #E8833A;box-shadow:0 8px 20px rgba(60,55,45,0.1);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E8833A;\">LANGKAH 2<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Phrase<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;line-height:1.3;\">gabungan kata, <strong>belum<\u002Fstrong> ada S + V<\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:23px;background:#FBEFE3;color:#C56A1E;border-radius:10px;padding:8px 12px;\">\"the smart student\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;color:#C9971A;\">\n        <div style=\"font-size:54px;font-weight:800;line-height:0.8;\">→<\u002Fdiv>\n        <div style=\"font-family:'Caveat',cursive;font-size:26px;color:#9A6B12;margin-top:2px;\">+ S &amp; V<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- CLAUSE -->\n      <div style=\"flex:1;background:#fff;border-radius:18px;border-top:7px solid #C9971A;box-shadow:0 8px 20px rgba(60,55,45,0.1);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#C9971A;\">LANGKAH 3<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Clause<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;line-height:1.3;\">klausa — <strong>sudah<\u002Fstrong> ada S + V<\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:23px;background:#FBF6EC;color:#9A6B12;border-radius:10px;padding:8px 12px;\">\"the student reads\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;color:#C9971A;\">\n        <div style=\"font-size:54px;font-weight:800;line-height:0.8;\">→<\u002Fdiv>\n        <div style=\"font-family:'Caveat',cursive;font-size:26px;color:#9A6B12;margin-top:2px;\">digabung<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- SENTENCE -->\n      <div style=\"flex:1.05;background:#33302A;border-radius:18px;border-top:7px solid #4FA15B;box-shadow:0 8px 22px rgba(60,55,45,0.18);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;color:#FBF7EE;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#8FD89B;\">LANGKAH 4<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Sentence<\u002Fdiv>\n        <div style=\"font-size:24px;color:#C9B8A0;line-height:1.3;\">kalimat — simple → <strong style=\"color:#fff;\">complex<\u002Fstrong><\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:22px;background:rgba(255,255,255,0.12);color:#fff;border-radius:10px;padding:8px 12px;\">\"The student reads because…\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:12px 26px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:32px;color:#9A6B12;\">Inti:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">kuasai tiap tahap berurutan — melompat tahap membuat kalimat jadi berantakan.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 2. DAFTAR ISI ============ -->\n<section data-label=\"Daftar Isi\" data-speaker-notes=\"Ini peta perjalanan kita. Delapan topik fondasi disusun dari yang terkecil—kata—sampai kalimat dan tense. Lalu ada tutorial merangkai kalimat, kesalahan umum, dan latihan. Tiap topik punya warna sendiri supaya gampang diingat.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:80px 88px 64px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 70px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:62px;font-weight:800;margin:0 0 4px;\">Daftar Isi<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:32px;\">disusun dari kata terkecil sampai kalimat utuh<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #E2574C;\"><div style=\"font-size:30px;font-weight:800;color:#E2574C;\">01<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Word<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Kelas kata<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #2FA0A0;\"><div style=\"font-size:30px;font-weight:800;color:#2FA0A0;\">02<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Pronouns<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Kata ganti<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #3B82C4;\"><div style=\"font-size:30px;font-weight:800;color:#3B82C4;\">03<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Conjunction<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Kata hubung<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #E8833A;\"><div style=\"font-size:30px;font-weight:800;color:#E8833A;\">04<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Phrase<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Gabungan kata<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #6B6FD6;\"><div style=\"font-size:30px;font-weight:800;color:#6B6FD6;\">05<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Adjective Order<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Urutan kata sifat<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #C1447E;\"><div style=\"font-size:30px;font-weight:800;color:#C1447E;\">06<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Adverb<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Kata keterangan<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #C9971A;\"><div style=\"font-size:30px;font-weight:800;color:#C9971A;\">07<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Clause<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Anak &amp; induk kalimat<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #4FA15B;\"><div style=\"font-size:30px;font-weight:800;color:#4FA15B;\">08<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Sentence<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Tipe kalimat<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #9B5FC0;\"><div style=\"font-size:30px;font-weight:800;color:#9B5FC0;\">09<\u002Fdiv><div style=\"font-size:25px;font-weight:800;margin-top:4px;\">Tense<\u002Fdiv><div style=\"font-size:22px;color:#7A746A;\">Present · Past · Future<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:18px;margin-top:26px;\">\n    <div style=\"flex:1;background:#EFEAFB;border-radius:14px;padding:20px 26px;border-left:6px solid #9B5FC0;\"><div style=\"font-size:25px;font-weight:800;color:#7C4FB0;\">＋ Tutorial Merangkai Kalimat<\u002Fdiv><div style=\"font-size:24px;color:#5C5448;margin-top:4px;\">4 langkah + contoh membangun kalimat bertahap<\u002Fdiv><\u002Fdiv>\n    <div style=\"flex:1;background:#FBE9E6;border-radius:14px;padding:20px 26px;border-left:6px solid #E2574C;\"><div style=\"font-size:25px;font-weight:800;color:#C2453B;\">＋ Kesalahan Umum &amp; Latihan<\u002Fdiv><div style=\"font-size:24px;color:#5C5448;margin-top:4px;\">Pilihan ganda + menjodohkan, lengkap dengan kunci<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 3. CARA MEMBACA ============ -->\n<section data-label=\"Cara Membaca\" data-speaker-notes=\"Sebelum mulai, kenali tiga hal: kode warna untuk kelas kata, kotak Cara Cepat yang berisi trik, dan latihan Coba Yuk. Di Coba Yuk, jawaban tersembunyi—klik tombolnya untuk membuka. Coba sekarang.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:80px 88px 64px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 70px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:60px;font-weight:800;margin:0 0 4px;\">Cara Membaca Materi Ini<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:30px;\">tiga hal supaya belajarmu lancar<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:28px;align-items:start;\">\n    <div style=\"background:#fff;border-radius:16px;padding:30px 32px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:18px;\">1 · KODE WARNA KELAS KATA<\u002Fdiv>\n      <div style=\"font-size:32px;line-height:1.9;font-weight:600;\">The <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 8px;border-radius:5px;font-weight:700;\">intelligent<\u002Fspan> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 8px;border-radius:5px;font-weight:700;\">student<\u002Fspan> <span style=\"background:#DCEAF6;color:#2A66A8;padding:2px 8px;border-radius:5px;font-weight:700;\">reads<\u002Fspan> a book <span style=\"background:#DDF0E1;color:#357A47;padding:2px 8px;border-radius:5px;font-weight:700;\">carefully<\u002Fspan>.<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:24px;\">\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#FBE3E1;color:#B23A30;\">● Noun (benda)<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#DCEAF6;color:#2A66A8;\">● Verb (kerja)<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#FBF0D6;color:#9A6B12;\">● Adjective (sifat)<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#DDF0E1;color:#357A47;\">● Adverb (keterangan)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:24px;\">\n      <div style=\"background:#FFF3BF;border-radius:8px;padding:22px 26px;box-shadow:0 6px 16px rgba(60,55,45,0.12);transform:rotate(1.2deg);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:40px;font-weight:700;color:#9A6B12;margin-bottom:2px;\">Cara Cepat<\u002Fdiv>\n        <div style=\"font-size:24px;line-height:1.45;color:#5C4A1E;\">Kotak kuning ini berisi <strong>trik singkat<\u002Fstrong> supaya cepat paham — selalu ada di tiap topik.<\u002Fdiv>\n      <\u002Fdiv>\n      <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:18px 24px;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n          <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:34px;\">Coba Yuk!<\u002Fspan> &nbsp;Jawaban disembunyikan dulu<\u002Fspan>\n          <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n        <\u002Fsummary>\n        <div style=\"margin-top:14px;font-size:24px;line-height:1.5;color:#2C3A2F;\">Bagus! Coba dulu sendiri, baru klik tombol ini untuk mencocokkan jawaban. 👍<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 4. WORD ============ -->\n<section data-label=\"Word\" data-speaker-notes=\"Topik pertama: word, atau kata. Inilah unit terkecil bahasa. Empat kelas utama yang wajib dikenali: noun, verb, adjective, adverb. Kuncinya: kenali dari fungsinya dalam kalimat, bukan sekadar bentuknya.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:74px 88px 56px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:22px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E2574C;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:7px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 01 · WORD<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:12px;\"><h2 style=\"font-size:56px;font-weight:800;margin:0;\">Word<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:40px;color:#E2574C;\">kelas kata<\u002Fspan><\u002Fdiv>\n      <div style=\"height:13px;width:250px;background:rgba(226,87,76,0.30);border-radius:6px;margin-top:2px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:30px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"background:#fff;border-top:5px solid #E2574C;border-radius:14px;padding:24px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E2574C;margin-bottom:10px;\">DEFINISI<\u002Fdiv>\n          <p style=\"font-size:26px;line-height:1.5;margin:0;color:#3D3A33;\"><strong>Word<\u002Fstrong> (kata) adalah unit terkecil bahasa yang punya makna. Setiap kata masuk salah satu kelas utama: <strong>Noun, Verb, Adjective,<\u002Fstrong> atau <strong>Adverb<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFF3BF;border-radius:8px;padding:20px 24px;box-shadow:0 6px 16px rgba(60,55,45,0.12);transform:rotate(1deg);\">\n          <div style=\"font-family:'Caveat',cursive;font-size:36px;font-weight:700;color:#9A6B12;\">Cara Cepat<\u002Fdiv>\n          <p style=\"font-size:24px;line-height:1.4;margin:4px 0 0;color:#5C4A1E;\">Lihat <strong>fungsinya<\u002Fstrong>, bukan bentuknya. Akhiran <strong>-ly<\u002Fstrong> biasanya Adverb; kata yang bisa didahului <strong>\"the\"<\u002Fstrong> biasanya Noun.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:24px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:12px;\">CONTOH<\u002Fdiv>\n          <p style=\"font-size:28px;line-height:1.6;margin:0 0 8px;font-weight:600;\">The <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 7px;border-radius:5px;font-weight:700;\">intelligent<\u002Fspan> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 7px;border-radius:5px;font-weight:700;\">student<\u002Fspan> <span style=\"background:#DCEAF6;color:#2A66A8;padding:2px 7px;border-radius:5px;font-weight:700;\">reads<\u002Fspan> an <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 7px;border-radius:5px;font-weight:700;\">interesting<\u002Fspan> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 7px;border-radius:5px;font-weight:700;\">book<\u002Fspan> <span style=\"background:#DDF0E1;color:#357A47;padding:2px 7px;border-radius:5px;font-weight:700;\">carefully<\u002Fspan>.<\u002Fp>\n          <p style=\"font-size:24px;font-style:italic;color:#8A8377;margin:0;\">\"Murid yang cerdas membaca buku menarik dengan hati-hati.\"<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#FBE3E1;color:#B23A30;\">Noun: student, book<\u002Fspan>\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#DCEAF6;color:#2A66A8;\">Verb: reads<\u002Fspan>\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#FBF0D6;color:#9A6B12;\">Adj: intelligent, interesting<\u002Fspan>\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#DDF0E1;color:#357A47;\">Adverb: carefully<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:16px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Tentukan kelas kata: \"She walks slowly through the beautiful garden.\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:12px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>walks<\u002Fstrong> = Verb · <strong>slowly<\u002Fstrong> = Adverb · <strong>beautiful<\u002Fstrong> = Adjective · <strong>garden<\u002Fstrong> = Noun · <strong>She<\u002Fstrong> = Pronoun.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 4b. WORD 2 — PARTS OF SPEECH ============ -->\n<section data-label=\"Parts of Speech\" data-speaker-notes=\"Ini tabel pembeda lengkap kedelapan parts of speech. Empat yang utama—noun, verb, adjective, adverb—sudah kita bahas. Empat lainnya: pronoun pengganti benda, preposition kata depan, conjunction kata hubung, dan interjection kata seru. Hafalkan fungsinya, karena tiap kata pasti masuk salah satu dari delapan ini.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:14px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#E2574C;color:#fff;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 01 · WORD<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:48px;font-weight:800;margin:0;\">8 Parts of Speech<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:36px;color:#E2574C;\">tabel pembeda kelas kata<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FBE3E1;border-radius:10px;padding:10px 18px;font-size:23px;color:#9A4A42;max-width:430px;line-height:1.35;\">Setiap kata pasti masuk <strong>salah satu<\u002Fstrong> dari 8 jenis ini.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;background:#E2574C;color:#fff;font-weight:800;font-size:23px;\">\n        <div style=\"padding:11px 18px;\">Jenis<\u002Fdiv>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Fungsi<\u002Fdiv>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Contoh kata<\u002Fdiv>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Contoh dalam kalimat<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:23px;color:#3D3A33;flex:1;display:flex;flex-direction:column;\">\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#B23A30;\">Noun <span style=\"font-weight:600;color:#8A8377;\">(benda)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">nama orang, benda, tempat<\u002Fdiv><div style=\"padding:8px 14px;\">student, book, Jakarta<\u002Fdiv><div style=\"padding:8px 14px;\">The <strong>student<\u002Fstrong> reads.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#1E7878;\">Pronoun <span style=\"font-weight:600;color:#8A8377;\">(ganti)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">pengganti kata benda<\u002Fdiv><div style=\"padding:8px 14px;\">I, she, they, it<\u002Fdiv><div style=\"padding:8px 14px;\"><strong>She<\u002Fstrong> reads it.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#2A66A8;\">Verb <span style=\"font-weight:600;color:#8A8377;\">(kerja)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">aksi / keadaan<\u002Fdiv><div style=\"padding:8px 14px;\">read, run, is<\u002Fdiv><div style=\"padding:8px 14px;\">She <strong>reads<\u002Fstrong> daily.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#9A6B12;\">Adjective <span style=\"font-weight:600;color:#8A8377;\">(sifat)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">menerangkan benda<\u002Fdiv><div style=\"padding:8px 14px;\">smart, big, red<\u002Fdiv><div style=\"padding:8px 14px;\">a <strong>smart<\u002Fstrong> student<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#357A47;\">Adverb <span style=\"font-weight:600;color:#8A8377;\">(ket.)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">menerangkan kerja/sifat<\u002Fdiv><div style=\"padding:8px 14px;\">quickly, very, well<\u002Fdiv><div style=\"padding:8px 14px;\">reads <strong>quickly<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#6B6FD6;\">Preposition <span style=\"font-weight:600;color:#8A8377;\">(depan)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">tunjuk tempat/waktu/arah<\u002Fdiv><div style=\"padding:8px 14px;\">in, on, at, to<\u002Fdiv><div style=\"padding:8px 14px;\"><strong>in<\u002Fstrong> the library<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#3B82C4;\">Conjunction <span style=\"font-weight:600;color:#8A8377;\">(hubung)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">menyambung kata/klausa<\u002Fdiv><div style=\"padding:8px 14px;\">and, but, because<\u002Fdiv><div style=\"padding:8px 14px;\">tea <strong>and<\u002Fstrong> coffee<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#C56A1E;\">Interjection <span style=\"font-weight:600;color:#8A8377;\">(seru)<\u002Fspan><\u002Fdiv><div style=\"padding:8px 14px;\">ungkapan perasaan<\u002Fdiv><div style=\"padding:8px 14px;\">Wow!, Oh!, Ouch!<\u002Fdiv><div style=\"padding:8px 14px;\"><strong>Wow!<\u002Fstrong> It's big.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:11px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:23px;color:#5C4A1E;\">empat baris pertama (Noun–Adverb) paling sering muncul; kuasai dulu keempatnya.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PRONOUNS 1 ============ -->\n<section data-label=\"Pronouns 1\" data-speaker-notes=\"Topik keempat: pronoun atau kata ganti. Fungsinya menggantikan kata benda supaya tidak diulang-ulang. Perhatikan tabel ini—satu baris untuk tiap orang. Kolomnya: subject untuk pelaku, object untuk yang dikenai, possessive adjective yang menempel pada benda, possessive pronoun yang berdiri sendiri, dan reflexive untuk diri sendiri.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#2FA0A0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 02 · PRONOUNS<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Pronouns<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#2FA0A0;\">tabel kata ganti (1/2)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:12px;padding:12px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.07);max-width:560px;\"><span style=\"font-size:24px;color:#3D3A33;line-height:1.4;\"><strong style=\"color:#2FA0A0;\">Pronoun<\u002Fstrong> menggantikan noun agar tidak diulang. <em>\"Rina reads. <u>She<\u002Fu> likes it.\"<\u002Fem><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;background:#2FA0A0;color:#fff;font-weight:800;font-size:22px;\">\n        <div style=\"padding:14px 16px;\">Orang<\u002Fdiv>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Subject<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(pelaku)<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Object<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(dikenai)<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Possessive Adj<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(+ benda)<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Possessive Pron<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(berdiri sendiri)<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Reflexive<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(diri sendiri)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:24px;color:#3D3A33;flex:1;display:flex;flex-direction:column;\">\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#fff;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">I (saya)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">I<\u002Fdiv><div style=\"padding:11px 12px;\">me<\u002Fdiv><div style=\"padding:11px 12px;\">my<\u002Fdiv><div style=\"padding:11px 12px;\">mine<\u002Fdiv><div style=\"padding:11px 12px;\">myself<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#F7FBFB;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">You (kamu)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">you<\u002Fdiv><div style=\"padding:11px 12px;\">you<\u002Fdiv><div style=\"padding:11px 12px;\">your<\u002Fdiv><div style=\"padding:11px 12px;\">yours<\u002Fdiv><div style=\"padding:11px 12px;\">yourself<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#fff;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">He (dia ♂)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">he<\u002Fdiv><div style=\"padding:11px 12px;\">him<\u002Fdiv><div style=\"padding:11px 12px;\">his<\u002Fdiv><div style=\"padding:11px 12px;\">his<\u002Fdiv><div style=\"padding:11px 12px;\">himself<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#F7FBFB;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">She (dia ♀)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">she<\u002Fdiv><div style=\"padding:11px 12px;\">her<\u002Fdiv><div style=\"padding:11px 12px;\">her<\u002Fdiv><div style=\"padding:11px 12px;\">hers<\u002Fdiv><div style=\"padding:11px 12px;\">herself<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#fff;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">It (benda)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">it<\u002Fdiv><div style=\"padding:11px 12px;\">it<\u002Fdiv><div style=\"padding:11px 12px;\">its<\u002Fdiv><div style=\"padding:11px 12px;\">—<\u002Fdiv><div style=\"padding:11px 12px;\">itself<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#F7FBFB;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">We (kami)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">we<\u002Fdiv><div style=\"padding:11px 12px;\">us<\u002Fdiv><div style=\"padding:11px 12px;\">our<\u002Fdiv><div style=\"padding:11px 12px;\">ours<\u002Fdiv><div style=\"padding:11px 12px;\">ourselves<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;background:#fff;flex:1;align-items:center;\"><div style=\"padding:11px 16px;font-weight:700;\">They (mereka)<\u002Fdiv><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">they<\u002Fdiv><div style=\"padding:11px 12px;\">them<\u002Fdiv><div style=\"padding:11px 12px;\">their<\u002Fdiv><div style=\"padding:11px 12px;\">theirs<\u002Fdiv><div style=\"padding:11px 12px;\">themselves<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:16px;\">\n      <div style=\"flex:1;background:#FFF3BF;border-radius:8px;padding:12px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\"><strong>my<\u002Fstrong> + benda (\"my book\"), tapi <strong>mine<\u002Fstrong> berdiri sendiri (\"It's mine\").<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;background:#E0F1F1;border-radius:8px;padding:12px 22px;\"><span style=\"font-size:24px;color:#1E5E5E;\"><strong>Contoh:<\u002Fstrong> \"She did it <strong>herself<\u002Fstrong>.\" → reflexive, aksi kembali ke pelaku.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Pronouns 2\" data-speaker-notes=\"Lanjutan pronoun. Selain personal pronoun, ada empat jenis lagi. Relative pronoun menyambung keterangan ke benda. Demonstrative menunjuk benda dekat atau jauh. Interrogative untuk bertanya. Indefinite menunjuk sesuatu yang tidak spesifik. Lihat contoh tiap jenisnya.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#2FA0A0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 02 · PRONOUNS<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Jenis Pronoun Lainnya<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#2FA0A0;\">(2/2)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #2A66A8;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">Relative Pronoun<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Menyambung keterangan ke kata benda<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">who<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">whom<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">which<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">that<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">whose<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;font-size:24px;background:#F4F8FC;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"The boy <strong>who<\u002Fstrong> won is my friend.\" <span style=\"color:#8A8377;font-style:italic;\">— anak laki-laki yang menang…<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #B23A30;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#B23A30;\">Demonstrative Pronoun<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Menunjuk benda (dekat / jauh)<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">this<\u002Fspan><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">that<\u002Fspan><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">these<\u002Fspan><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">those<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;font-size:24px;background:#FCF4F3;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"<strong>This<\u002Fstrong> is my book; <strong>those<\u002Fstrong> are yours.\" <span style=\"color:#8A8377;font-style:italic;\">— ini… itu…<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #9A6B12;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#9A6B12;\">Interrogative Pronoun<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Untuk bertanya<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">who<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">what<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">which<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">whose<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;font-size:24px;background:#FBF7EC;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"<strong>What<\u002Fstrong> do you want?\" <span style=\"color:#8A8377;font-style:italic;\">— apa yang kamu mau?<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #357A47;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#357A47;\">Indefinite Pronoun<\u002Fdiv>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Menunjuk yang tidak spesifik<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">someone<\u002Fspan><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">anything<\u002Fspan><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">everybody<\u002Fspan><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">nothing<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;font-size:24px;background:#F4FAF5;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"<strong>Someone<\u002Fstrong> is knocking.\" <span style=\"color:#8A8377;font-style:italic;\">— seseorang sedang mengetuk.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Pilih pronoun tepat: \"The phone ___ rang is mine.\" (who / which)<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>which<\u002Fstrong> — untuk benda. \"who\" hanya untuk orang.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CONJUNCTION ============ -->\n<section data-label=\"Conjunction\" data-speaker-notes=\"Topik kelima: conjunction atau kata hubung. Kita pelajari SEBELUM kalimat, karena kata hubung inilah yang menyambung klausa-klausa jadi kalimat majemuk. Ada dua keluarga. Coordinating menghubungkan dua hal setara—hafalkan FANBOYS. Subordinating membuat anak kalimat, seperti because, when, if. Lihat tabel untuk daftar dan fungsinya.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#3B82C4;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 03 · CONJUNCTION<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Conjunction<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#3B82C4;\">kata hubung (1/2)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:12px;padding:12px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.07);max-width:640px;\"><span style=\"font-size:24px;color:#3D3A33;line-height:1.4;\"><strong style=\"color:#3B82C4;\">Conjunction<\u002Fstrong> menyambung kata, frasa, atau klausa. Ada <strong>3 jenis<\u002Fstrong>: <strong>a.<\u002Fstrong> Coordinating, <strong>b.<\u002Fstrong> Subordinating, &amp; <strong>c.<\u002Fstrong> Correlative.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#DCEAF6;padding:12px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">a. Coordinating<\u002Fdiv><div style=\"font-size:22px;color:#3B6FA0;\">menghubungkan elemen <strong>setara<\u002Fstrong> — 7 kata <strong>FANBOYS<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">for<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">sebab — \"…, <strong>for<\u002Fstrong> it was late.\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">and<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">menambah — \"tea <strong>and<\u002Fstrong> coffee\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">nor<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">tidak juga — \"…, <strong>nor<\u002Fstrong> does he drink.\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">but<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">kontras — \"cheap <strong>but<\u002Fstrong> good\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">or<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">pilihan — \"tea <strong>or<\u002Fstrong> coffee?\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">yet<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">namun — \"small <strong>yet<\u002Fstrong> strong\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 12px;border-radius:8px;\">so<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\">akibat — \"Late, <strong>so<\u002Fstrong> we ran.\"<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#EAF2FB;padding:12px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#2A66A8;\">Ingat:<\u002Fspan> <span style=\"font-size:24px;color:#274660;font-weight:700;\">FANBOYS<\u002Fspan> <span style=\"font-size:22px;color:#3B6FA0;\">= for, and, nor, but, or, yet, so<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#FBE3E1;padding:14px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#B23A30;\">b. Subordinating<\u002Fdiv><div style=\"font-size:22px;color:#9A4A42;\">membuat <strong>anak kalimat<\u002Fstrong> (dependent)<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">because<\u002Fspan><span style=\"font-size:24px;color:#3D3A33;\">sebab — \"…<strong>because<\u002Fstrong> I was tired.\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">when<\u002Fspan><span style=\"font-size:24px;color:#3D3A33;\">waktu — \"<strong>when<\u002Fstrong> she arrived…\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">if<\u002Fspan><span style=\"font-size:24px;color:#3D3A33;\">syarat — \"<strong>if<\u002Fstrong> you study…\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">although<\u002Fspan><span style=\"font-size:24px;color:#3D3A33;\">meski — \"<strong>although<\u002Fstrong> it rained…\"<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:14px 22px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">while<\u002Fspan><span style=\"font-size:24px;color:#3D3A33;\">sementara — \"<strong>while<\u002Fstrong> he slept…\"<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#FCEEEC;padding:12px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#B23A30;\">Catatan:<\u002Fspan> <span style=\"font-size:22px;color:#7F2A22;\">anak kalimat ini selalu butuh induk kalimat.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Pilih: \"I stayed home ___ it was raining.\" (but / because)<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>because<\u002Fstrong> — menyatakan sebab (alasan tinggal di rumah).<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Correlative\" data-speaker-notes=\"Jenis ketiga: correlative conjunction. Ini adalah kata hubung yang selalu datang berpasangan—dua kata yang bekerja sama menghubungkan dua bagian setara. Yang paling penting: both and, either or, neither nor, dan not only but also. Kuncinya, dua bagian yang dihubungkan harus sejajar bentuknya.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:14px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#3B82C4;color:#fff;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 03 · CONJUNCTION<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:48px;font-weight:800;margin:0;\">Conjunction<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:36px;color:#3B82C4;\">pasangan kata hubung (2/2)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:12px;padding:12px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.07);max-width:520px;\"><span style=\"font-size:23px;color:#3D3A33;line-height:1.4;\"><strong style=\"color:#3B82C4;\">Correlative<\u002Fstrong> selalu <strong>berpasangan<\u002Fstrong> &amp; menghubungkan dua bagian <strong>setara<\u002Fstrong>.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"background:#DCEAF6;padding:12px 24px;\"><div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">c. Correlative Conjunction<\u002Fdiv><div style=\"font-size:22px;color:#3B6FA0;\">selalu datang <strong>berpasangan<\u002Fstrong> — menghubungkan dua bagian <strong>setara<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:8px 24px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:center;flex:1;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 14px;border-radius:8px;text-align:center;\">both … and<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\"><strong style=\"color:#2A66A8;\">keduanya<\u002Fstrong> — \"<strong>Both<\u002Fstrong> Rina <strong>and<\u002Fstrong> Tom passed.\"<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:8px 24px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:center;flex:1;background:#F4F8FC;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 14px;border-radius:8px;text-align:center;\">either … or<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\"><strong style=\"color:#2A66A8;\">salah satu<\u002Fstrong> — \"Take <strong>either<\u002Fstrong> tea <strong>or<\u002Fstrong> coffee.\"<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:8px 24px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:center;flex:1;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 14px;border-radius:8px;text-align:center;\">neither … nor<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\"><strong style=\"color:#2A66A8;\">tidak keduanya<\u002Fstrong> — \"<strong>Neither<\u002Fstrong> he <strong>nor<\u002Fstrong> she came.\"<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:8px 24px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:center;flex:1;background:#F4F8FC;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:20px;padding:5px 12px;border-radius:8px;text-align:center;\">not only … but also<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\"><strong style=\"color:#2A66A8;\">bukan hanya…tetapi juga<\u002Fstrong> — \"<strong>Not only<\u002Fstrong> smart <strong>but also<\u002Fstrong> kind.\"<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:8px 24px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:center;flex:1;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:5px 14px;border-radius:8px;text-align:center;\">whether … or<\u002Fspan><span style=\"font-size:23px;color:#3D3A33;\"><strong style=\"color:#2A66A8;\">apakah…atau<\u002Fstrong> — \"Decide <strong>whether<\u002Fstrong> to stay <strong>or<\u002Fstrong> go.\"<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:auto;background:#EAF2FB;padding:12px 24px;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#2A66A8;\">Ingat:<\u002Fspan> <span style=\"font-size:23px;color:#274660;\">dua bagian yang dihubungkan harus <strong>sejajar<\u002Fstrong> bentuknya (parallel).<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Lengkapi: \"She speaks ___ English ___ French.\" (kedua bahasa)<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\">\"She speaks <strong>both<\u002Fstrong> English <strong>and<\u002Fstrong> French.\" → pasangan <strong>both … and<\u002Fstrong>.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PHRASE ============ -->\n<section data-label=\"Phrase\" data-speaker-notes=\"Topik kedua: phrase atau frasa. Frasa adalah gabungan kata yang bekerja sebagai satu kesatuan, tapi BELUM punya pasangan subjek dan kata kerja, sehingga belum bisa berdiri sendiri sebagai kalimat. Ada beberapa jenis sesuai inti katanya: noun phrase intinya kata benda, prepositional phrase diawali kata depan, adverbial phrase memberi keterangan. Semua jenis ini adalah potongan-potongan yang nanti dirangkai jadi kalimat utuh.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 48px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E8833A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 04 · PHRASE<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Phrase<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#E8833A;\">gabungan kata (1/3)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:26px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"background:#fff;border-top:5px solid #E8833A;border-radius:14px;padding:20px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E8833A;margin-bottom:8px;\">APA ITU PHRASE?<\u002Fdiv>\n          <p style=\"font-size:25px;line-height:1.45;margin:0;color:#3D3A33;\"><strong>Phrase<\u002Fstrong> (frasa) = <strong>gabungan kata<\u002Fstrong> yang menyatu jadi satu makna, tapi <strong>belum<\u002Fstrong> punya pasangan <em>subjek + kata kerja<\u002Fem>. Karena itu phrase <strong>belum bisa berdiri sendiri<\u002Fstrong> sebagai kalimat — ia hanya <strong>potongan<\u002Fstrong> yang dipakai untuk membangun kalimat.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBEFE3;border-radius:12px;padding:16px 22px;border-left:6px solid #E8833A;\">\n          <div style=\"font-size:24px;font-weight:800;color:#C56A1E;margin-bottom:2px;\">Inti yang perlu diingat<\u002Fdiv>\n          <p style=\"font-size:24px;line-height:1.4;margin:0;color:#5C4A40;\">Nama tiap phrase diambil dari <strong>kata intinya<\u002Fstrong>. Panah <strong>(↑)<\u002Fstrong> pada contoh menunjuk inti tiap frasa. Phrase = <strong>potongan<\u002Fstrong>, bukan kalimat utuh.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:18px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:10px;\">CONTOH DALAM KALIMAT<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px 10px;font-size:25px;font-weight:600;\">\n            <div style=\"text-align:center;\"><div style=\"background:#FBE3E1;color:#B23A30;padding:2px 8px;border-radius:5px;\">The intelligent student<\u002Fdiv><div style=\"font-size:20px;color:#B23A30;margin-top:2px;\">↑ Noun Phrase<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;\"><div style=\"background:#DCEAF6;color:#2A66A8;padding:2px 8px;border-radius:5px;\">in the library<\u002Fdiv><div style=\"font-size:20px;color:#2A66A8;margin-top:2px;\">↑ Prepositional<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;\"><div style=\"padding:2px 4px;color:#3D3A33;\">reads<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;\"><div style=\"background:#DDF0E1;color:#357A47;padding:2px 8px;border-radius:5px;\">very carefully<\u002Fdiv><div style=\"font-size:20px;color:#357A47;margin-top:2px;\">↑ Adverbial<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:24px;font-style:italic;color:#8A8377;margin:10px 0 0;\">\"Murid cerdas di perpustakaan membaca dengan sangat hati-hati.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"background:#FBE3E1;border-radius:12px;padding:16px 20px;border-left:6px solid #B23A30;\">\n          <div style=\"font-size:24px;font-weight:800;color:#B23A30;\">Noun Phrase <span style=\"font-weight:600;font-size:21px;color:#9A4A42;\">— frasa benda<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:24px;color:#5C4A40;line-height:1.4;m
