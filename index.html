very day, now, already<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;background:#2A66A8;color:#fff;font-weight:800;font-size:22px;\">\n        <div style=\"padding:12px 16px;\">Bentuk<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(+) Positif<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(−) Negatif<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(?) Tanya<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:9px 16px;background:#F4F8FC;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#2A66A8;\">Simple<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">V1 (+s untuk he/she/it)<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#2A66A8;\">studies<\u002Fstrong> English.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia belajar bahasa Inggris.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">does not study<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia tidak belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Does<\u002Fstrong> she study?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:9px 16px;background:#F7F2FA;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#7C4FB0;\">Continuous<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">am/is/are + V-ing<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#7C4FB0;\">is studying<\u002Fstrong> now.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia sedang belajar sekarang.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">is not studying<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia tidak sedang belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Is<\u002Fstrong> she studying?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia sedang belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;\">\n        <div style=\"padding:9px 16px;background:#FBF6EC;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#9A6B12;\">Perfect<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">have/has + V3<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#9A6B12;\">has studied<\u002Fstrong> already.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia sudah belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">has not studied<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia belum belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Has<\u002Fstrong> she studied?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia sudah belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:8px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">negatif &amp; tanya simple present pakai <strong>do/does<\u002Fstrong>; bentuk lain pakai kata bantunya sendiri (is, has).<\u002Fspan><\u002Fdiv>\n    <details style=\"background:#EDF3FB;border:2px dashed #8FB0DC;border-radius:12px;padding:8px 18px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\">\n        <span style=\"font-size:23px;font-weight:700;color:#214E80;\">Bagaimana kalau kata kerjanya <strong>bukan<\u002Fstrong> action verb? <span style=\"font-weight:600;color:#3B6FA0;\">(linking verb \"to be\": is / am / are)<\u002Fspan><\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#2A66A8;color:#fff;font-weight:800;font-size:21px;padding:7px 15px;border-radius:8px;white-space:nowrap;\">penjelasan ▾<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:6px;font-size:20px;line-height:1.3;color:#274660;\">Linking verb <strong>to be<\u002Fstrong> (is/am/are) bukan kata aksi — ia menghubungkan subjek dengan <strong>sifat, keadaan,<\u002Fstrong> atau <strong>identitas<\u002Fstrong>nya, tanpa V-ing maupun do/does. <strong style=\"color:#2A66A8;\">Contoh:<\u002Fstrong> She <strong>is<\u002Fstrong> tall <em style=\"color:#8A8377;\">(sifat)<\u002Fem> · They <strong>are<\u002Fstrong> happy <em style=\"color:#8A8377;\">(keadaan)<\u002Fem> · He <strong>is<\u002Fstrong> a doctor <em style=\"color:#8A8377;\">(identitas)<\u002Fem>.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 14. PAST TENSE ============ -->\n<section data-label=\"Past Tense\" data-speaker-notes=\"Past tense—kejadian lampau. Simple past untuk yang selesai di masa lalu: pakai V2. Past continuous untuk yang sedang berlangsung saat itu: was atau were plus V-ing. Past perfect untuk yang selesai sebelum kejadian lampau lain: had plus V3. Lihat versi positif, negatif, dan tanyanya. Catatan: kalau verbnya bukan aksi melainkan to be, di masa lampau pakai was atau were untuk menyatakan sifat, keadaan, atau identitas.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:48px 76px 28px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:6px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#B23A30;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TENSE · PAST<\u002Fspan>\n        <h2 style=\"font-size:48px;font-weight:800;margin:8px 0 0;\">Past Tense <span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:38px;color:#B23A30;\">— masa lampau<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"background:#FBE3E1;border-radius:10px;padding:10px 18px;font-size:24px;color:#7F2A22;\">Penanda: <em>yesterday, last night, ago<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;background:#B23A30;color:#fff;font-weight:800;font-size:22px;\">\n        <div style=\"padding:12px 16px;\">Bentuk<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(+) Positif<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(−) Negatif<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(?) Tanya<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:9px 16px;background:#FCF2F1;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#B23A30;\">Simple<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">V2 (past)<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">studied<\u002Fstrong> last night.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia belajar tadi malam.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">did not study<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia tidak belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Did<\u002Fstrong> she study?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:9px 16px;background:#F7F2FA;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#7C4FB0;\">Continuous<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">was/were + V-ing<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#7C4FB0;\">was studying<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia sedang belajar (saat itu).<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">was not studying<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia tidak sedang belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Was<\u002Fstrong> she studying?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia sedang belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;\">\n        <div style=\"padding:9px 16px;background:#FBF6EC;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#9A6B12;\">Perfect<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">had + V3<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#9A6B12;\">had studied<\u002Fstrong> before.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia sudah belajar sebelumnya.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">had not studied<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia belum belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:9px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Had<\u002Fstrong> she studied?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia sudah belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:8px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">simple past negatif/tanya pakai <strong>did<\u002Fstrong> + V1 (kata kerja kembali ke bentuk dasar).<\u002Fspan><\u002Fdiv>\n    <details style=\"background:#FBEEEC;border:2px dashed #DDA39C;border-radius:12px;padding:10px 20px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#7F2A22;\">Bagaimana kalau kata kerjanya <strong>bukan<\u002Fstrong> action verb? <span style=\"font-weight:600;color:#B05A50;\">(linking verb \"to be\" lampau: was / were)<\u002Fspan><\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:8px 16px;border-radius:8px;white-space:nowrap;\">penjelasan ▾<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:6px;font-size:21px;line-height:1.35;color:#5C2A24;\">Di masa lampau, linking verb <strong>to be<\u002Fstrong> jadi <strong>was/were<\u002Fstrong> — tetap menyatakan <strong>sifat, keadaan,<\u002Fstrong> atau <strong>identitas<\u002Fstrong>, tanpa did. <span style=\"color:#8A8377;\">(I/he/she/it → was · you/we/they → were)<\u002Fspan> <strong style=\"color:#B23A30;\">Contoh:<\u002Fstrong> She <strong>was<\u002Fstrong> tall <em style=\"color:#8A8377;\">(sifat)<\u002Fem> · They <strong>were<\u002Fstrong> happy <em style=\"color:#8A8377;\">(keadaan)<\u002Fem> · He <strong>was<\u002Fstrong> a doctor <em style=\"color:#8A8377;\">(identitas)<\u002Fem>.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 15. FUTURE TENSE ============ -->\n<section data-label=\"Future Tense\" data-speaker-notes=\"Future tense—kejadian akan datang. Simple future untuk rencana atau janji: will plus V1. Future continuous untuk yang akan sedang berlangsung: will be plus V-ing. Future perfect untuk yang akan selesai sebelum waktu tertentu: will have plus V3. Versi positif, negatif, dan tanya seperti biasa.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:14px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#357A47;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TENSE · FUTURE<\u002Fspan>\n        <h2 style=\"font-size:48px;font-weight:800;margin:8px 0 0;\">Future Tense <span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:38px;color:#357A47;\">— akan datang<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"background:#DDF0E1;border-radius:10px;padding:10px 18px;font-size:24px;color:#2C5C39;\">Penanda: <em>tomorrow, next week, soon<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;background:#357A47;color:#fff;font-weight:800;font-size:22px;\">\n        <div style=\"padding:12px 16px;\">Bentuk<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(+) Positif<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(−) Negatif<\u002Fdiv>\n        <div style=\"padding:12px 16px;border-left:1px solid rgba(255,255,255,0.25);\">(?) Tanya<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:14px 16px;background:#F2F8F4;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#357A47;\">Simple<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">will + V1<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#357A47;\">will study<\u002Fstrong> tomorrow.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia akan belajar besok.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">will not study<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia tidak akan belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Will<\u002Fstrong> she study?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia akan belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:14px 16px;background:#F7F2FA;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#7C4FB0;\">Continuous<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">will be + V-ing<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#7C4FB0;\">will be studying<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia akan sedang belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">won't be studying<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia tidak akan sedang belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Will<\u002Fstrong> she be studying?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia akan sedang belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;\">\n        <div style=\"padding:14px 16px;background:#FBF6EC;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#9A6B12;\">Perfect<\u002Fdiv><div style=\"font-size:21px;color:#7A746A;\">will have + V3<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#9A6B12;\">will have studied<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia akan sudah selesai belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span>She <strong style=\"color:#B23A30;\">won't have studied<\u002Fstrong>.<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Dia belum akan selesai belajar.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><div style=\"display:flex;flex-direction:column;gap:2px;\"><span><strong style=\"color:#357A47;\">Will<\u002Fstrong> she have studied?<\u002Fspan><span style=\"font-size:18px;font-style:italic;font-weight:500;color:#A99F8E;\">Apakah dia akan sudah belajar?<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:11px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">semua future pakai <strong>will<\u002Fstrong>. Negatif = will not (<strong>won't<\u002Fstrong>); tanya = <strong>Will<\u002Fstrong> + subjek di depan.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 16. ACTION vs LINKING VERB ============ -->\n<section data-label=\"Action &amp; Linking\" data-speaker-notes=\"Khusus simple tense, kenali dua jenis kata kerja. Action verb menunjukkan perbuatan—run, eat, study. Linking verb menghubungkan subjek dengan keterangannya, yang paling umum adalah to be: am, is, are, was, were. Bedanya penting: action verb diikuti objek atau adverb, sedangkan linking verb diikuti kata sifat atau kata benda yang menerangkan subjek.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#9B5FC0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">SIMPLE TENSE · DUA JENIS VERB<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:50px;font-weight:800;margin:0;\">Action vs Linking Verb<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#9B5FC0;\">kata kerja aksi &amp; penghubung<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:12px;padding:14px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);\"><p style=\"font-size:24px;line-height:1.4;margin:0;color:#3D3A33;\">Di <strong>simple tense<\u002Fstrong>, kata kerja terbagi dua. Membedakannya penting agar tahu apa yang mengikutinya.<\u002Fp><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:6px solid #2A66A8;padding:24px 28px;display:flex;flex-direction:column;gap:12px;\">\n        <div><div style=\"font-size:30px;font-weight:800;color:#2A66A8;\">Action Verb<\u002Fdiv><div style=\"font-size:24px;color:#7A746A;\">menunjukkan <strong>perbuatan / aksi<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">run<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">eat<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">study<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">write<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">play<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:22px;color:#7A746A;line-height:1.35;\"><strong style=\"color:#2A66A8;\">Biasanya muncul:<\u002Fstrong> saat menceritakan kegiatan / aktivitas — narasi, perintah, rutinitas.<\u002Fdiv>\n        <div style=\"font-size:24px;color:#3D3A33;background:#F4F8FC;border-radius:8px;padding:12px 16px;\">Diikuti <strong>objek / adverb<\u002Fstrong>:<br>\"She <span style=\"color:#2A66A8;font-weight:700;\">studies<\u002Fspan> English.\" <span style=\"color:#8A8377;font-style:italic;\">(belajar apa?)<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#EAF2FB;border-radius:8px;padding:12px 16px;font-size:24px;color:#1F4E80;\">\"They <strong>play<\u002Fstrong> football every Sunday.\"<br><span style=\"color:#8A8377;font-style:italic;\">Mereka bermain bola tiap Minggu.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:6px solid #9A6B12;padding:24px 28px;display:flex;flex-direction:column;gap:12px;\">\n        <div><div style=\"font-size:30px;font-weight:800;color:#9A6B12;\">Linking Verb<\u002Fdiv><div style=\"font-size:24px;color:#7A746A;\">menghubungkan subjek dengan <strong>keterangannya<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">am / is / are<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">was / were<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">seem<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">become<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:22px;color:#7A746A;line-height:1.35;\"><strong style=\"color:#9A6B12;\">Biasanya muncul:<\u002Fstrong> saat mendeskripsikan / mengidentifikasi subjek — sifat, profesi, keadaan.<\u002Fdiv>\n        <div style=\"font-size:24px;color:#3D3A33;background:#FBF7EC;border-radius:8px;padding:12px 16px;\">Diikuti <strong>kata sifat / benda<\u002Fstrong>:<br>\"She <span style=\"color:#9A6B12;font-weight:700;\">is<\u002Fspan> diligent.\" <span style=\"color:#8A8377;font-style:italic;\">(menerangkan She)<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#FBF6EC;border-radius:8px;padding:12px 16px;font-size:24px;color:#6E4E0E;\">\"They <strong>are<\u002Fstrong> good students.\"<br><span style=\"color:#8A8377;font-style:italic;\">Mereka adalah murid yang baik.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:11px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">linking verb (to be) <strong>tidak butuh objek<\u002Fstrong> — ingat: \"I <u>am<\u002Fu> 16 years old\", bukan \"I have 16\".<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 17. MERANGKAI 4 LANGKAH ============ -->\n<section data-label=\"4 Langkah\" data-speaker-notes=\"Sekarang kita gabungkan semuanya. Merangkai kalimat yang benar bisa dipecah jadi empat langkah berurutan: tentukan subjek, pilih kata kerja dan sesuaikan tense-nya, tambahkan objek, lalu lengkapi dengan keterangan dan kata hubung. Ikuti urutan ini dan kalimatmu akan rapi.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:74px 88px 60px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <span style=\"display:inline-block;background:#33302A;color:#FBF7EE;font-weight:800;font-size:24px;letter-spacing:2px;padding:7px 16px;border-radius:8px;transform:rotate(-1deg);\">TUTORIAL · MERANGKAI KALIMAT<\u002Fspan>\n  <h2 style=\"font-size:58px;font-weight:800;margin:14px 0 2px;\">Merangkai Kalimat — 4 Langkah<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:26px;\">ikuti urutannya, dijamin rapi<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\">\n    <div style=\"background:#fff;border-radius:16px;padding:24px;box-shadow:0 6px 16px rgba(60,55,45,0.08);border-top:6px solid #E2574C;\">\n      <div style=\"font-size:46px;font-weight:800;color:#E2574C;line-height:1;\">1<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:800;margin:8px 0 4px;\">Tentukan SUBJECT<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;line-height:1.4;\">Siapa / apa pelakunya?<\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:24px;font-weight:700;background:#FBE3E1;color:#B23A30;padding:8px 12px;border-radius:8px;display:inline-block;\">She<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;padding:24px;box-shadow:0 6px 16px rgba(60,55,45,0.08);border-top:6px solid #4FA15B;\">\n      <div style=\"font-size:46px;font-weight:800;color:#4FA15B;line-height:1;\">2<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:800;margin:8px 0 4px;\">Pilih VERB + TENSE<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;line-height:1.4;\">Kapan terjadi? (rutin → present)<\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:24px;font-weight:700;background:#DDF0E1;color:#357A47;padding:8px 12px;border-radius:8px;display:inline-block;\">studies<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;padding:24px;box-shadow:0 6px 16px rgba(60,55,45,0.08);border-top:6px solid #3B82C4;\">\n      <div style=\"font-size:46px;font-weight:800;color:#3B82C4;line-height:1;\">3<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:800;margin:8px 0 4px;\">Tambah OBJECT<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;line-height:1.4;\">Apa yang dikenai aksi?<\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:24px;font-weight:700;background:#DCEAF6;color:#2A66A8;padding:8px 12px;border-radius:8px;display:inline-block;\">English<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;padding:24px;box-shadow:0 6px 16px rgba(60,55,45,0.08);border-top:6px solid #9B5FC0;\">\n      <div style=\"font-size:46px;font-weight:800;color:#9B5FC0;line-height:1;\">4<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:800;margin:8px 0 4px;\">KETERANGAN &amp; HUBUNG<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;line-height:1.4;\">Tambah adverb + conjunction<\u002Fdiv>\n      <div style=\"margin-top:14px;font-size:24px;font-weight:700;background:#F0E4F7;color:#7C4FB0;padding:8px 12px;border-radius:8px;display:inline-block;\">carefully, because...<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:28px;background:#33302A;border-radius:16px;padding:28px 34px;color:#FBF7EE;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#C9B8A0;margin-bottom:10px;\">HASIL KALIMAT LENGKAP<\u002Fdiv>\n    <div style=\"font-size:34px;font-weight:700;line-height:1.5;\"><span style=\"color:#F4938A;\">She<\u002Fspan> <span style=\"color:#8FD89B;\">studies<\u002Fspan> <span style=\"color:#8FC4F0;\">English<\u002Fspan> <span style=\"color:#C9B8A0;\">carefully every day,<\u002Fspan> <span style=\"color:#C9A8E4;\">because she wants to be fluent.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 18. MEMBANGUN BERTAHAP ============ -->\n<section data-label=\"Contoh Bertahap\" data-speaker-notes=\"Mari lihat kalimat tumbuh selangkah demi selangkah. Mulai dari satu kata subjek, tambah kata kerja, tambah objek, lalu keterangan, dan terakhir anak kalimat. Setiap baris hanya menambah satu bagian baru—lihat bagian yang ditandai. Beginilah cara membangun kalimat kompleks dari yang sederhana.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:74px 88px 56px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <span style=\"display:inline-block;background:#33302A;color:#FBF7EE;font-weight:800;font-size:24px;letter-spacing:2px;padding:7px 16px;border-radius:8px;transform:rotate(-1deg);\">TUTORIAL · CONTOH BERTAHAP<\u002Fspan>\n  <h2 style=\"font-size:58px;font-weight:800;margin:14px 0 2px;\">Membangun Kalimat Bertahap<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:24px;\">dari satu kata jadi kalimat kompleks<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:13px;\">\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#E2574C;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">1<\u002Fdiv>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\"><span style=\"background:#FBE3E1;color:#B23A30;padding:2px 8px;border-radius:5px;\">She<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#E2574C;\">+ Subject<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">2<\u002Fdiv>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\">She <span style=\"background:#DDF0E1;color:#357A47;padding:2px 8px;border-radius:5px;\">studies<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#4FA15B;\">+ Verb (present)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#3B82C4;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">3<\u002Fdiv>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\">She studies <span style=\"background:#DCEAF6;color:#2A66A8;padding:2px 8px;border-radius:5px;\">English<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#3B82C4;\">+ Object<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#C9971A;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">4<\u002Fdiv>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\">She studies English <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 8px;border-radius:5px;\">carefully every day<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#C9971A;\">+ Keterangan<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#33302A;border-radius:12px;padding:18px 24px;box-shadow:0 6px 16px rgba(60,55,45,0.14);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#9B5FC0;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">5<\u002Fdiv>\n      <div style=\"flex:1;font-size:28px;font-weight:700;color:#FBF7EE;\">She studies English carefully every day, <span style=\"background:#F0E4F7;color:#7C4FB0;padding:2px 8px;border-radius:5px;\">because she wants to be fluent<\u002Fspan>.<\u002Fdiv>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#C9A8E4;\">+ Dependent clause → Complex<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 19. KESALAHAN UMUM ============ -->\n<section data-label=\"Kesalahan Umum\" data-speaker-notes=\"Ini kesalahan yang paling sering muncul. Perhatikan baik-baik: tambahkan s untuk he, she, it di simple present; continuous selalu pakai be plus V-ing; ikuti urutan S-V-O; anak kalimat butuh induk; dan umur pakai to be, bukan have. Hafalkan kelima ini, nilaimu langsung naik.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:74px 88px 56px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:58px;font-weight:800;margin:0 0 2px;\">Kesalahan Umum &amp; Perbaikannya<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:14px;\">hindari jebakan-jebakan ini<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"color:#B23A30;font-weight:800;\">✗<\u002Fspan> He study hard.<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓<\u002Fspan> He <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">studies<\u002Fspan> hard.<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;\">Subject he/she/it + <strong>-s<\u002Fstrong> pada simple present.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗<\u002Fspan> She is study now.<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓<\u002Fspan> She is <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">studying<\u002Fspan> now.<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;\">Continuous = <strong>be + V-ing<\u002Fstrong>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗<\u002Fspan> Yesterday books I read.<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓<\u002Fspan> I read books yesterday.<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;\">Ikuti urutan <strong>S-V-O<\u002Fstrong>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗<\u002Fspan> Because she late.<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓<\u002Fspan> Because she <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">was<\u002Fspan> late, she...<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;\">Dependent clause butuh <strong>verb<\u002Fstrong> + induk kalimat.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗<\u002Fspan> I have 16 years old.<\u002Fdiv>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓<\u002Fspan> I <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">am<\u002Fspan> 16 years old.<\u002Fdiv>\n      <div style=\"font-size:24px;color:#7A746A;\">Umur pakai <strong>to be<\u002Fstrong>, bukan \"have\".<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:13px;background:#EFEAFB;border-radius:14px;padding:14px 26px;border-left:6px solid #9B5FC0;\">\n    <div style=\"font-size:24px;font-weight:800;color:#7C4FB0;margin-bottom:7px;\">Dua wajah kata “have”<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n      <div style=\"background:#fff;border-radius:10px;padding:11px 16px;\"><div style=\"font-size:23px;font-weight:800;color:#B23A30;\">have = kata kerja “milik”<\u002Fdiv><div style=\"font-size:23px;color:#3D3A33;line-height:1.35;margin-top:2px;\">artinya <strong>punya<\u002Fstrong>. <em>“I <strong>have<\u002Fstrong> a book.”<\u002Fem> → saya punya buku.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:11px 16px;\"><div style=\"font-size:23px;font-weight:800;color:#2A66A8;\">have = kata bantu (perfect)<\u002Fdiv><div style=\"font-size:23px;color:#3D3A33;line-height:1.35;margin-top:2px;\">have/has + <strong>V3<\u002Fstrong>. <em>“I <strong>have<\u002Fstrong> read it.”<\u002Fem> → sudah membaca.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 20. LATIHAN: PILIHAN GANDA ============ -->\n<section data-label=\"Latihan: Pilihan Ganda\" data-speaker-notes=\"Latihan pertama: pilihan ganda. Lima soal dari berbagai topik. Baca tiap soal, pilih A, B, atau C di kepala, baru klik untuk melihat kunci. Jangan mengintip dulu.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:52px;font-weight:800;margin:0 0 2px;\">Latihan 1 — Pilihan Ganda<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;margin-bottom:18px;\">pilih jawaban, lalu buka kuncinya<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n    <details style=\"background:#fff;border:2px dashed #2A66A8;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">1. She ___ to school every day.<br><span style=\"font-weight:600;color:#5C5448;\">a) go &nbsp; b) goes &nbsp; c) going<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) goes — simple present, subjek \"she\" + -s.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #7C4FB0;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">2. Look! They ___ football now.<br><span style=\"font-weight:600;color:#5C5448;\">a) play &nbsp; b) plays &nbsp; c) are playing<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">c) are playing — ada \"now\" → present continuous.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #B23A30;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">3. I ___ my homework an hour ago.<br><span style=\"font-weight:600;color:#5C5448;\">a) finish &nbsp; b) finished &nbsp; c) have finished<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) finished — ada \"ago\" → simple past (V2).<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #357A47;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">4. We ___ to Bali next week.<br><span style=\"font-weight:600;color:#5C5448;\">a) go &nbsp; b) will go &nbsp; c) went<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) will go — ada \"next week\" → simple future.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #2FA0A0;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">5. This pen is ___ . (milik saya)<br><span style=\"font-weight:600;color:#5C5448;\">a) my &nbsp; b) mine &nbsp; c) me<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) mine — possessive pronoun, berdiri sendiri.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #6B6FD6;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">6. Urutan benar:<br><span style=\"font-weight:600;color:#5C5448;\">a) a red big ball &nbsp; b) a big red ball &nbsp; c) a ball red big<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) a big red ball — Size sebelum Color (OSASCOMP).<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #E8833A;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">7. It was raining, ___ we stayed home.<br><span style=\"font-weight:600;color:#5C5448;\">a) but &nbsp; b) so &nbsp; c) or<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) so — menyatakan akibat (FANBOYS).<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #9A6B12;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">8. Kalimat yang BENAR:<br><span style=\"font-weight:600;color:#5C5448;\">a) He don't like it &nbsp; b) He doesn't like it &nbsp; c) He not like it<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) He doesn't like it — he/she/it pakai does + V1.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;background:#FFF3BF;border-radius:8px;padding:11px 24px;transform:rotate(-0.5deg);box-shadow:0 5px 14px rgba(60,55,45,0.1);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Tips:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">cari kata penanda waktu (now, ago, next week) untuk menentukan tense.<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 21. LATIHAN: MENJODOHKAN ============ -->\n<section data-label=\"Latihan: Menjodohkan\" data-speaker-notes=\"Latihan kedua: menjodohkan. Cocokkan istilah di kiri dengan contoh atau definisi di kanan. Coba pasangkan sendiri dulu, baru buka kunci jawabannya di bawah.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:52px;font-weight:800;margin:0 0 2px;\">Latihan 2 — Menjodohkan<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;margin-bottom:18px;\">cocokkan istilah dengan contohnya<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:1px;color:#7A746A;\">ISTILAH<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">1.<\u002Fspan> Noun Phrase<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">2.<\u002Fspan> Dependent Clause<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">3.<\u002Fspan> Coordinating Conj.<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">4.<\u002Fspan> Present Perfect<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:13px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">5.<\u002Fspan> Reflexive Pronoun<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:13px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">6.<\u002Fspan> Adjective Order<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:1px;color:#7A746A;\">CONTOH / DEFINISI<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">A.<\u002Fspan> \"because she was tired\"<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">B.<\u002Fspan> \"myself, herself, themselves\"<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">C.<\u002Fspan> \"the intelligent student\"<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">D.<\u002Fspan> \"She has studied already.\"<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:13px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">E.<\u002Fspan> \"and, but, or, so\" (FANBOYS)<\u002Fdiv>\n      <div style=\"background:#fff;border-radius:10px;padding:13px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">F.<\u002Fspan> \"a big red ball\" (Size → Color)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <details style=\"margin-top:18px;background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:16px 24px;\">\n    <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n      <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Kunci Jawaban<\u002Fspan> &nbsp;cocokkan dulu sebelum membuka!<\u002Fspan>\n      <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Kunci →<\u002Fspan>\n    <\u002Fsummary>\n    <div style=\"margin-top:12px;font-size:26px;line-height:1.6;color:#2C3A2F;font-weight:700;\">1 → C &nbsp;·&nbsp; 2 → A &nbsp;·&nbsp; 3 → E &nbsp;·&nbsp; 4 → D &nbsp;·&nbsp; 5 → B &nbsp;·&nbsp; 6 → F<\u002Fdiv>\n  <\u002Fdetails>\n<\u002Fsection>\n\n<!-- ============ 21c. LATIHAN 3: PERBAIKI KALIMAT ============ -->\n<section data-label=\"Latihan: Perbaiki Kalimat\" data-speaker-notes=\"Latihan ketiga, jenis soal yang berbeda: perbaiki kalimat. Tiap kalimat punya satu kesalahan. Coba temukan dan betulkan sendiri di kepala, baru klik untuk melihat versi yang benar beserta alasannya. Ini melatih ketelitian.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:52px;font-weight:800;margin:0 0 2px;\">Latihan 3 — Perbaiki Kalimat<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;margin-bottom:18px;\">temukan kesalahannya, lalu betulkan<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n    <details style=\"background:#fff;border:2px dashed #2A66A8;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;color:#B23A30;\">1. <span style=\"font-weight:800;\">✗<\u002Fspan> She go to school.<\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Betulkan<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">✓ She <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">goes<\u002Fspan> to school. <span style=\"font-weight:600;color:#7A746A;\">— subjek she + -s.<\u002Fspan><\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #7C4FB0;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;color:#B23A30;\">2. <span style=\"font-weight:800;\">✗<\u002Fspan> They is happy.<\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Betulkan<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">✓ They <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">are<\u002Fspan> happy. <span style=\"font-weight:600;color:#7A746A;\">— \"they\" pakai are.<\u002Fspan><\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #B23A30;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;color:#B23A30;\">3. <span style=\"font-weight:800;\">✗<\u002Fspan> I have eat lunch.<\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Betulkan<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">✓ I have <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">eaten<\u002Fspan> lunch. <span style=\"font-weight:600;color:#7A746A;\">— perfect = have + V3.<\u002Fspan><\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #2FA0A0;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;color:#B23A30;\">4. <span style=\"font-weight:800;\">✗<\u002Fspan> He don't like tea.<\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Betulkan<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">✓ He <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">doesn't<\u002Fspan> like tea. <span style=\"font-weight:600;color:#7A746A;\">— he/she/it pakai doesn't.<\u002Fspan><\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #E8833A;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;color:#B23A30;\">5. <span style=\"font-weight:800;\">✗<\u002Fspan> Yesterday I am tired.<\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Betulkan<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">✓ Yesterday I <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">was<\u002Fspan> tired. <span style=\"font-weight:600;color:#7A746A;\">— lampau pakai was.<\u002Fspan><\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #6B6FD6;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;color:#B23A30;\">6. <span style=\"font-weight:800;\">✗<\u002Fspan> a red big ball<\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Betulkan<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">✓ a <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">big red<\u002Fspan> ball <span style=\"font-weight:600;color:#7A746A;\">— Size sebelum Color.<\u002Fspan><\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;background:#FFF3BF;border-radius:8px;padding:11px 24px;transform:rotate(-0.5deg);box-shadow:0 5px 14px rgba(60,55,45,0.1);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Tips:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">cek dulu subjek &amp; tense — di situ kesalahan paling sering bersembunyi.<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 21d. LATIHAN 4: ADVERB ============ -->\n<section data-label=\"Latihan: Adverb\" data-speaker-notes=\"Latihan keempat, khusus adverb. Sepuluh soal campuran: pilih adverb yang tepat, tentukan jenisnya, dan cek posisinya dalam kalimat. Coba jawab dulu di kepala, baru buka kunci.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:52px;font-weight:800;margin:0 0 2px;\">Latihan 4 — Adverb<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;margin-bottom:18px;\">pilih &amp; tentukan jenisnya, lalu buka kuncinya<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n    <details style=\"background:#fff;border:2px dashed #C1447E;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">1. She sings ___ . (beautiful)<br><span style=\"font-weight:600;color:#5C5448;\">a) beautiful &nbsp; b) beautifully &nbsp; c) beauty<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) beautifully — manner adverb, adjective + ly.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #7C4FB0;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">2. He ___ drinks coffee. (jenis: frequency)<br><span style=\"font-weight:600;color:#5C5448;\">a) never &nbsp; b) yesterday &nbsp; c) very<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">a) never — frequency adverb (seberapa sering).<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #2A66A8;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">3. Posisi benar untuk \"always\":<br><span style=\"font-weight:600;color:#5C5448;\">a) She always is happy &nbsp; b) She is always happy &nbsp; c) Always she is happy<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) She is always happy — frequency adverb setelah to be.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #B23A30;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">4. Bentuk adverb dari \"good\":<br><span style=\"font-weight:600;color:#5C5448;\">a) goodly &nbsp; b) well &nbsp; c) gooder<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) well — pengecualian, tidak beraturan.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #357A47;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">5. This tea is ___ sweet. (jenis: degree)<br><span style=\"font-weight:600;color:#5C5448;\">a) here &nbsp; b) too &nbsp; c) often<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) too — degree adverb (menguatkan sifat).<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #2FA0A0;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">6. Ubah \"happy\" jadi adverb:<br><span style=\"font-weight:600;color:#5C5448;\">a) happyly &nbsp; b) happily &nbsp; c) happyy<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) happily — akhiran -y jadi -i sebelum +ly.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #E8833A;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">7. The kids play ___ . (jenis: place)<br><span style=\"font-weight:600;color:#5C5448;\">a) outside &nbsp; b) slowly &nbsp; c) always<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">a) outside — place adverb (di mana).<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #9A6B12;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">8. Kalimat yang BENAR:<br><span style=\"font-weight:600;color:#5C5448;\">a) He usually is late &nbsp; b) He is usually late &nbsp; c) He is late usually<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) He is usually late — frequency setelah \"is\".<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #6B6FD6;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">9. \"gentle\" jadi adverb:<br><span style=\"font-weight:600;color:#5C5448;\">a) gentlely &nbsp; b) gently &nbsp; c) gentley<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) gently — huruf \"e\" luruh sebelum +ly.<\u002Fdiv>\n    <\u002Fdetails>\n    <details style=\"background:#fff;border:2px dashed #C1447E;border-radius:14px;padding:14px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">10. \"yesterday\" termasuk jenis adverb:<br><span style=\"font-weight:600;color:#5C5448;\">a) manner &nbsp; b) time &nbsp; c) degree<\u002Fspan><\u002Fspan><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci<\u002Fspan><\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) time — menjawab \"kapan?\".<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;background:#FFF3BF;border-radius:8px;padding:11px 24px;transform:rotate(-0.5deg);box-shadow:0 5px 14px rgba(60,55,45,0.1);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Tips:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">cek dulu pertanyaan yang dijawab adverb — bagaimana, kapan, di mana, seberapa sering, atau seberapa.<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 22. RANGKUMAN ============ -->\n<section data-label=\"Rangkuman\" data-speaker-notes=\"Mari kita rangkum. Delapan topik fondasi: kelas kata, frasa, klausa, kata ganti, kata hubung, urutan kata sifat, kalimat, dan tense. Kuasai semuanya, karena ini adalah pondasi sebelum naik ke Level 2.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:74px 88px 56px 172px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <h2 style=\"font-size:58px;font-weight:800;margin:0 0 2px;\">Rangkuman Level 1<\u002Fh2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:24px;\">sembilan fondasi yang sudah kamu kuasai<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #E2574C;\"><div style=\"font-size:23px;font-weight:800;color:#E2574C;\">Word<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Noun, Verb, Adjective, Adverb<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #E8833A;\"><div style=\"font-size:23px;font-weight:800;color:#E8833A;\">Phrase<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Noun / Prepositional / Adverbial<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #C9971A;\"><div style=\"font-size:23px;font-weight:800;color:#C9971A;\">Clause<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Independent vs Dependent<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #2FA0A0;\"><div style=\"font-size:23px;font-weight:800;color:#2FA0A0;\">Pronouns<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Personal, possessive, relative…<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #3B82C4;\"><div style=\"font-size:23px;font-weight:800;color:#3B82C4;\">Conjunction<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Coordinating &amp; Subordinating<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #6B6FD6;\"><div style=\"font-size:23px;font-weight:800;color:#6B6FD6;\">Adjective Order<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">OSASCOMP<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #C1447E;\"><div style=\"font-size:23px;font-weight:800;color:#C1447E;\">Adverb<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Manner, Time, Place, Frequency, Degree<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #4FA15B;\"><div style=\"font-size:23px;font-weight:800;color:#4FA15B;\">Sentence<\u002Fdiv><div style=\"font-size:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Simple → Compound-Complex<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #9B5FC0;\"><div style=\"font-size:23px;font-weight:800;color:#9B5FC0;\">Tense<\u002Fdiv><div style=\"font-size
