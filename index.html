argin-top:3px;\">Inti katanya <strong>kata benda<\u002Fstrong>. Berfungsi seperti benda (subjek/objek).<br><strong>\"the intelligent student\"<\u002Fstrong> → murid yang cerdas<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#DCEAF6;border-radius:12px;padding:16px 20px;border-left:6px solid #2A66A8;\">\n          <div style=\"font-size:24px;font-weight:800;color:#2A66A8;\">Prepositional Phrase <span style=\"font-weight:600;font-size:21px;color:#3B6FA0;\">— frasa kata depan<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:24px;color:#274660;line-height:1.4;margin-top:3px;\">Diawali <strong>kata depan<\u002Fstrong> (in, on, at, with...). Menjelaskan tempat/waktu/cara.<br><strong>\"in the library\"<\u002Fstrong> → di perpustakaan<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#DDF0E1;border-radius:12px;padding:16px 20px;border-left:6px solid #357A47;\">\n          <div style=\"font-size:24px;font-weight:800;color:#357A47;\">Adverbial Phrase <span style=\"font-weight:600;font-size:21px;color:#46805A;\">— frasa keterangan<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:24px;color:#2C4A38;line-height:1.4;margin-top:3px;\">Memberi <strong>keterangan<\u002Fstrong> pada kata kerja: bagaimana/kapan.<br><strong>\"very carefully\"<\u002Fstrong> → dengan sangat hati-hati<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#33302A;border-radius:12px;padding:14px 20px;color:#FBF7EE;\">\n          <div style=\"font-size:22px;line-height:1.4;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#F0C98A;\">Hubungannya:<\u002Fspan> ketiga frasa di atas adalah <strong>balok-balok<\u002Fstrong> yang dirangkai jadi satu kalimat utuh.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Tentukan jenis frasa: \"The tall boy / on the stage / sang beautifully.\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>The tall boy<\u002Fstrong> = Noun Phrase · <strong>on the stage<\u002Fstrong> = Prepositional Phrase · <strong>beautifully<\u002Fstrong> (adverb) sebagai Adverbial.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Phrase 2\" data-speaker-notes=\"Lanjutan phrase. Selain ketiga tadi, ada verb phrase dan adjective phrase. Verb phrase adalah kata kerja beserta kata bantunya, misalnya will read atau has finished—berfungsi sebagai predikat. Adjective phrase adalah kata sifat beserta penguatnya, misalnya very diligent atau extremely tall—menerangkan kata benda. Lihat contoh gabungan dengan panah yang menunjuk tiap frasa.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 48px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E8833A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 04 · PHRASE<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Verb &amp; Adjective Phrase<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#E8833A;\">(2/3)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #2A66A8;\">\n        <div style=\"font-size:27px;font-weight:800;color:#2A66A8;\">Verb Phrase <span style=\"font-weight:600;font-size:22px;color:#3B6FA0;\">— frasa kerja<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;margin:6px 0 10px;color:#3D3A33;\">Kata kerja utama + <strong>kata kerja bantu<\u002Fstrong> (will, has, is...) — dalam bahasa Inggris disebut <strong style=\"color:#1E7878;\">Auxiliary<\u002Fstrong>. Berfungsi sebagai <strong>predikat<\u002Fstrong>.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">will read<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">has finished<\u002Fspan><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">is studying<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #9A6B12;\">\n        <div style=\"font-size:27px;font-weight:800;color:#9A6B12;\">Adjective Phrase <span style=\"font-weight:600;font-size:22px;color:#A87E2E;\">— frasa sifat<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;margin:6px 0 10px;color:#3D3A33;\">Kata sifat + <strong>penguat<\u002Fstrong> (very, quite, extremely...). Menerangkan <strong>kata benda<\u002Fstrong>.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">very diligent<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">extremely tall<\u002Fspan><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">quite easy<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:22px 28px;box-shadow:0 6px 18px rgba(60,55,45,0.08);align-self:flex-start;display:inline-flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:22px;font-weight:800;letter-spacing:2px;color:#7A746A;\">CONTOH GABUNGAN — satu kalimat, banyak frasa<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-size:30px;font-weight:700;line-height:1.4;\">\n        <span style=\"background:#FBE3E1;color:#B23A30;padding:4px 12px;border-radius:8px;\">The <span style=\"background:#FBF0D6;color:#9A6B12;padding:1px 7px;border-radius:5px;\">extremely tall<\u002Fspan> player<\u002Fspan>\n        <span style=\"background:#DCEAF6;color:#2A66A8;padding:4px 12px;border-radius:8px;\">will score<\u002Fspan>\n        <span style=\"background:#DDF0E1;color:#357A47;padding:4px 12px;border-radius:8px;\">very easily<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px 22px;font-size:20px;font-weight:700;\">\n        <span style=\"display:flex;align-items:center;gap:8px;color:#B23A30;\"><span style=\"width:14px;height:14px;border-radius:4px;background:#FBE3E1;border:1.5px solid #B23A30;\"><\u002Fspan>Noun Phrase <span style=\"color:#9A6B12;font-weight:600;\">(berisi Adjective Phrase)<\u002Fspan><\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:8px;color:#2A66A8;\"><span style=\"width:14px;height:14px;border-radius:4px;background:#DCEAF6;border:1.5px solid #2A66A8;\"><\u002Fspan>Verb Phrase<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:8px;color:#357A47;\"><span style=\"width:14px;height:14px;border-radius:4px;background:#DDF0E1;border:1.5px solid #357A47;\"><\u002Fspan>Adverbial Phrase<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:23px;font-style:italic;color:#8A8377;margin:0;\">\"Pemain yang sangat tinggi itu akan mencetak skor dengan sangat mudah.\"<\u002Fp>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Sebutkan jenis frasa: \"has been waiting\" dan \"very happy\".<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>has been waiting<\u002Fstrong> = Verb Phrase (kata kerja + bantu) · <strong>very happy<\u002Fstrong> = Adjective Phrase (penguat + sifat).<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PHRASE 3 — RINGKASAN ============ -->\n<section data-label=\"Phrase 3\" data-speaker-notes=\"Sebelum lanjut, ini tabel ringkasan kelima jenis phrase dalam satu pandangan. Tiap baris: nama frasa, kata inti atau pembentuknya, fungsinya di kalimat, dan contoh. Gunakan tabel ini sebagai rujukan cepat saat ragu menentukan jenis frasa.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 48px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E8833A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 04 · PHRASE<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Ringkasan Jenis Phrase<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#E8833A;\">5 jenis dalam satu tabel (3/3)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.55fr 1.5fr;background:#E8833A;color:#fff;font-weight:800;font-size:24px;\">\n        <div style=\"padding:13px 20px;\">Jenis Frasa<\u002Fdiv>\n        <div style=\"padding:13px 16px;border-left:1px solid rgba(255,255,255,0.25);\">Inti / Pembentuk<\u002Fdiv>\n        <div style=\"padding:13px 16px;border-left:1px solid rgba(255,255,255,0.25);\">Fungsi di Kalimat<\u002Fdiv>\n        <div style=\"padding:13px 16px;border-left:1px solid rgba(255,255,255,0.25);\">Contoh<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.55fr 1.5fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;font-size:24px;color:#3D3A33;\">\n        <div style=\"padding:10px 20px;font-weight:800;color:#B23A30;\">Noun Phrase<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">kata benda (+ penjelas)<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">jadi <strong>subjek / objek<\u002Fstrong><\u002Fdiv>\n        <div style=\"padding:10px 16px;font-weight:600;color:#B23A30;\">\"the intelligent student\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.55fr 1.5fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;font-size:24px;color:#3D3A33;background:#FBFAF6;\">\n        <div style=\"padding:10px 20px;font-weight:800;color:#2A66A8;\">Prepositional Phrase<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">diawali <strong>kata depan<\u002Fstrong> (in, on, at)<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">keterangan tempat / waktu<\u002Fdiv>\n        <div style=\"padding:10px 16px;font-weight:600;color:#2A66A8;\">\"in the library\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.55fr 1.5fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;font-size:24px;color:#3D3A33;\">\n        <div style=\"padding:10px 20px;font-weight:800;color:#357A47;\">Adverbial Phrase<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">inti <strong>adverb<\u002Fstrong> (keterangan)<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">menerangkan <strong>kata kerja<\u002Fstrong><\u002Fdiv>\n        <div style=\"padding:10px 16px;font-weight:600;color:#357A47;\">\"very carefully\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.55fr 1.5fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;font-size:24px;color:#3D3A33;background:#FBFAF6;\">\n        <div style=\"padding:10px 20px;font-weight:800;color:#2FA0A0;\">Verb Phrase<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">kata kerja + <strong>kata kerja bantu<\u002Fstrong> <span style=\"display:inline-block;background:#E7F4F4;color:#1E7878;font-size:18px;font-weight:800;padding:1px 9px;border-radius:10px;margin-left:2px;\">Auxiliary<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:10px 16px;\">jadi <strong>predikat<\u002Fstrong><\u002Fdiv>\n        <div style=\"padding:10px 16px;font-weight:600;color:#2FA0A0;\">\"will read\", \"has finished\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.55fr 1.5fr;flex:1;align-items:center;font-size:24px;color:#3D3A33;\">\n        <div style=\"padding:10px 20px;font-weight:800;color:#9A6B12;\">Adjective Phrase<\u002Fdiv>\n        <div style=\"padding:10px 16px;\">kata sifat + <strong>penguat<\u002Fstrong><\u002Fdiv>\n        <div style=\"padding:10px 16px;\">menerangkan <strong>kata benda<\u002Fstrong><\u002Fdiv>\n        <div style=\"padding:10px 16px;font-weight:600;color:#9A6B12;\">\"very diligent\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Tentukan jenis: \"with a loud voice\" dan \"extremely difficult\".<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>with a loud voice<\u002Fstrong> = Prepositional Phrase (diawali \"with\") · <strong>extremely difficult<\u002Fstrong> = Adjective Phrase (penguat + sifat).<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ADJECTIVE ORDER ============ -->\n<section data-label=\"Adjective Order\" data-speaker-notes=\"Topik keenam: adjective order, atau urutan kata sifat. Kalau ada beberapa kata sifat sebelum kata benda, urutannya tidak boleh acak. Bahasa Inggris punya urutan baku yang disingkat OSASCOMP: Opinion, Size, Age, Shape, Color, Origin, Material, Purpose, lalu benda. Native speaker memakai urutan ini secara otomatis.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#6B6FD6;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 05 · ADJECTIVE ORDER<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Adjective Order<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#6B6FD6;\">urutan kata sifat<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1.05fr;gap:26px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#fff;border-top:5px solid #6B6FD6;border-radius:14px;padding:18px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#6B6FD6;margin-bottom:6px;\">APA INI?<\u002Fdiv>\n          <p style=\"font-size:24px;line-height:1.45;margin:0;color:#3D3A33;\">Jika ada <strong>beberapa kata sifat<\u002Fstrong> sebelum benda, urutannya <strong>tidak acak<\u002Fstrong>. Ada urutan baku yang disingkat <strong>OSASCOMP<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:14px 20px;box-shadow:0 6px 18px rgba(60,55,45,0.08);display:flex;flex-direction:column;gap:7px;\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">O<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Opinion<\u002Fstrong> — pendapat (beautiful, nice)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">S<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Size<\u002Fstrong> — ukuran (big, small)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">A<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Age<\u002Fstrong> — usia (old, new)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">S<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Shape<\u002Fstrong> — bentuk (round, square)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">C<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Color<\u002Fstrong> — warna (red, blue)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">O<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Origin<\u002Fstrong> — asal (Italian, Japanese)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">M<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Material<\u002Fstrong> — bahan (wooden, plastic)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">P<\u002Fspan><span style=\"font-size:22px;color:#3D3A33;\"><strong>Purpose<\u002Fstrong> — kegunaan (dining, sleeping)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#FFF3BF;border-radius:8px;padding:16px 22px;box-shadow:0 6px 16px rgba(60,55,45,0.12);transform:rotate(0.8deg);\">\n          <div style=\"font-family:'Caveat',cursive;font-size:34px;font-weight:700;color:#9A6B12;\">Cara Cepat<\u002Fdiv>\n          <p style=\"font-size:24px;line-height:1.4;margin:2px 0 0;color:#5C4A1E;\">Hafalkan <strong>O-S-A-S-C-O-M-P<\u002Fstrong>. Pendapat selalu di depan, bahan &amp; kegunaan paling dekat dengan benda.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:18px 22px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#357A47;margin-bottom:10px;\">✓ CONTOH BENAR<\u002Fdiv>\n          <div style=\"font-size:25px;line-height:1.7;font-weight:600;\">a <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">beautiful<\u002Fspan> <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">small<\u002Fspan> <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">old<\u002Fspan> <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">round<\u002Fspan> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 7px;border-radius:5px;font-weight:700;\">table<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:21px;color:#7A746A;margin-top:6px;\">Opinion → Size → Age → Shape → <strong>Noun<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FCEEEC;border-radius:14px;padding:14px 22px;border-left:6px solid #B23A30;\">\n          <div style=\"font-size:24px;font-weight:800;color:#B23A30;margin-bottom:2px;\">✗ SALAH<\u002Fdiv>\n          <div style=\"font-size:24px;color:#7F2A22;\">\"a round old small beautiful table\" → urutan acak terdengar janggal.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Urutkan: \"Italian / a / leather / nice / bag\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\">\"a <strong>nice<\u002Fstrong> (opinion) <strong>Italian<\u002Fstrong> (origin) <strong>leather<\u002Fstrong> (material) <strong>bag<\u002Fstrong>.\" → Opinion → Origin → Material → Noun.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ADVERB 0 — BAGAN ============ -->\n<section data-label=\"Adverb: Bagan\" data-speaker-notes=\"Topik keenam: adverb, atau kata keterangan. Sebelum masuk detail, lihat dulu peta konsepnya. Adverb menerangkan kata kerja, kata sifat, atau adverb lain, dan selalu menjawab satu dari lima pertanyaan: bagaimana, kapan, di mana, seberapa sering, atau seberapa. Tiga slide berikutnya akan mengupas tiap jenis dengan banyak contoh.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#C1447E;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 06 · ADVERB<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Peta Konsep Adverb<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#C1447E;\">5 jenis kata keterangan (1/4)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:14px;padding:16px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <p style=\"font-size:24px;line-height:1.4;margin:0;color:#3D3A33;\"><strong style=\"color:#C1447E;\">Adverb<\u002Fstrong> menerangkan <strong>verb, adjective,<\u002Fstrong> atau <strong>adverb lain<\u002Fstrong>. Setiap adverb selalu menjawab <strong>salah satu<\u002Fstrong> dari lima pertanyaan berikut.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;flex:1;min-height:0;\">\n      <div style=\"background:#FBE4EF;border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:30px;color:#C1447E;font-weight:700;\">\"Bagaimana?\"<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;color:#C1447E;margin-top:4px;\">Manner<\u002Fdiv>\n        <div style=\"font-size:20px;color:#A54873;\">cara<\u002Fdiv>\n        <div style=\"font-size:21px;color:#5C4A55;margin-top:8px;line-height:1.35;\">menjelaskan <strong>cara<\u002Fstrong> sesuatu terjadi<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:6px 10px;font-size:19px;color:#7F2A5A;font-weight:700;\">slowly · well · carefully<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FCEEE3;border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:30px;color:#C56A1E;font-weight:700;\">\"Kapan?\"<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;color:#C56A1E;margin-top:4px;\">Time<\u002Fdiv>\n        <div style=\"font-size:20px;color:#A5641E;\">waktu<\u002Fdiv>\n        <div style=\"font-size:21px;color:#5C4A3A;margin-top:8px;line-height:1.35;\">menjelaskan <strong>kapan<\u002Fstrong> sesuatu terjadi<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:6px 10px;font-size:19px;color:#9A5218;font-weight:700;\">now · yesterday · soon<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F1EAFA;border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:30px;color:#7C4FB0;font-weight:700;\">\"Di mana?\"<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;color:#7C4FB0;margin-top:4px;\">Place<\u002Fdiv>\n        <div style=\"font-size:20px;color:#6A4693;\">tempat<\u002Fdiv>\n        <div style=\"font-size:21px;color:#4A3E5C;margin-top:8px;line-height:1.35;\">menjelaskan <strong>di mana<\u002Fstrong> sesuatu terjadi<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:6px 10px;font-size:19px;color:#6A4693;font-weight:700;\">here · outside · everywhere<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EAF2FB;border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:30px;color:#2A66A8;font-weight:700;\">\"Seberapa sering?\"<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;color:#2A66A8;margin-top:4px;\">Frequency<\u002Fdiv>\n        <div style=\"font-size:20px;color:#3B6FA0;\">kekerapan<\u002Fdiv>\n        <div style=\"font-size:21px;color:#324A5C;margin-top:8px;line-height:1.35;\">menjelaskan <strong>seberapa sering<\u002Fstrong><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:6px 10px;font-size:19px;color:#1F4E80;font-weight:700;\">always · often · never<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#DDF0E1;border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:30px;color:#357A47;font-weight:700;\">\"Seberapa?\"<\u002Fdiv>\n        <div style=\"font-size:25px;font-weight:800;color:#357A47;margin-top:4px;\">Degree<\u002Fdiv>\n        <div style=\"font-size:20px;color:#46805A;\">tingkat<\u002Fdiv>\n        <div style=\"font-size:21px;color:#2C5C39;margin-top:8px;line-height:1.35;\">menguatkan / melemahkan sifat<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:6px 10px;font-size:19px;color:#2C5C39;font-weight:700;\">very · too · quite<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:12px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara baca:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">cek dulu <strong>pertanyaan apa<\u002Fstrong> yang dijawab kata itu — 3 slide berikut mengupas tiap jenis dengan banyak contoh.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ADVERB 1 — MANNER ============ -->\n<section data-label=\"Adverb: Manner\" data-speaker-notes=\"Detail jenis pertama: manner adverb, menjelaskan cara sesuatu terjadi, biasanya dibentuk dari adjective ditambah akhiran -ly. Lihat delapan contoh berikut beserta artinya, lalu perhatikan tiga aturan pembentukan: tambah -ly langsung, ubah y jadi i sebelum -ly, dan hilangkan e sebelum -ly. Ada juga pengecualian seperti good menjadi well.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:12px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#C1447E;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">ADVERB · MANNER<\u002Fspan>\n        <h2 style=\"font-size:48px;font-weight:800;margin:8px 0 0;\">Manner Adverb <span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:38px;color:#C1447E;\">— cara (2/4)<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"background:#FBE4EF;border-radius:10px;padding:10px 18px;font-size:23px;color:#7F2A5A;max-width:420px;line-height:1.35;\">Jawab <strong>\"bagaimana?\"<\u002Fstrong> — umumnya adjective + <strong>-ly<\u002Fstrong>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#FBE4EF;padding:10px 22px;font-size:23px;font-weight:800;color:#C1447E;letter-spacing:1px;\">CONTOH<\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">She sings <strong style=\"color:#C1447E;\">beautifully<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— bernyanyi dengan indah.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#FDF4F8;\"><span style=\"font-size:22px;color:#3D3A33;\">He drives <strong style=\"color:#C1447E;\">carefully<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— menyetir hati-hati.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">They worked <strong style=\"color:#C1447E;\">quickly<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— bekerja dengan cepat.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#FDF4F8;\"><span style=\"font-size:22px;color:#3D3A33;\">He speaks <strong style=\"color:#C1447E;\">softly<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— berbicara dengan lembut.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">She did it <strong style=\"color:#C1447E;\">well<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— melakukannya dengan baik.<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#F7F0F4;padding:10px 22px;font-size:23px;font-weight:800;color:#7F2A5A;letter-spacing:1px;\">CARA MEMBENTUK<\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>quick<\u002Fstrong> + ly → <strong style=\"color:#C1447E;\">quickly<\u002Fstrong> <span style=\"font-style:italic;color:#A99F8E;\">(langsung tambah)<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#FDF4F8;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>happy<\u002Fstrong> → y jadi i + ly → <strong style=\"color:#C1447E;\">happily<\u002Fstrong><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>gentle<\u002Fstrong> → hilang e + ly → <strong style=\"color:#C1447E;\">gently<\u002Fstrong><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:6px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#FDF4F8;\"><span style=\"font-size:19px;color:#7F2A5A;line-height:1.3;\"><strong>Tanpa -ly (bentuknya sama persis):<\u002Fstrong> fast, hard, early, late, straight, high, low, near.<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:6px 22px;flex:1;display:flex;align-items:center;background:#FDF4F8;\"><span style=\"font-size:19px;color:#7F2A5A;line-height:1.3;\"><strong>Pengecualian khusus (beda kata):<\u002Fstrong> good (adj) → <strong>well<\u002Fstrong> (adv) — <em>bukan<\u002Fem> \"goodly\".<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#FFF3BF;padding:10px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:28px;color:#9A6B12;\">Posisi:<\u002Fspan> <span style=\"font-size:20px;color:#5C4A1E;\">biasanya di <strong>akhir kalimat<\u002Fstrong>, setelah objek.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:12px 22px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:23px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;\">Coba Yuk!<\u002Fspan> &nbsp;Ubah \"quiet\" jadi adverb: \"She spoke ___ .\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 16px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:8px;font-size:22px;line-height:1.4;color:#2C3A2F;\">\"She spoke <strong>quietly<\u002Fstrong>.\" — quiet + ly, manner adverb.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ADVERB 2 — TIME & PLACE ============ -->\n<section data-label=\"Adverb: Time &amp; Place\" data-speaker-notes=\"Detail jenis kedua dan ketiga: time adverb menjelaskan kapan, place adverb menjelaskan di mana. Lihat masing-masing lima contoh beserta artinya. Keduanya biasanya diletakkan di akhir kalimat; kalau ada dua-duanya sekaligus, place lebih dulu baru time.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:12px;\">\n    <div>\n      <span style=\"display:inline-block;background:#C1447E;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">ADVERB · TIME &amp; PLACE<\u002Fspan>\n      <h2 style=\"font-size:48px;font-weight:800;margin:8px 0 0;\">Time &amp; Place Adverb <span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:38px;color:#C1447E;\">— waktu &amp; tempat (3/4)<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#FCEEE3;padding:10px 22px;\"><div style=\"font-size:24px;font-weight:800;color:#C56A1E;\">Time (Waktu)<\u002Fdiv><div style=\"font-size:20px;color:#A5641E;\">jawab \"kapan?\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">I'll call you <strong style=\"color:#C56A1E;\">tomorrow<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— besok.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#FDF7F0;\"><span style=\"font-size:22px;color:#3D3A33;\">She left <strong style=\"color:#C56A1E;\">yesterday<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— kemarin.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">We are eating <strong style=\"color:#C56A1E;\">now<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— sekarang.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#FDF7F0;\"><span style=\"font-size:22px;color:#3D3A33;\">He'll arrive <strong style=\"color:#C56A1E;\">soon<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— segera.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">I haven't seen her <strong style=\"color:#C56A1E;\">lately<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— akhir-akhir ini.<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#F1EAFA;padding:10px 22px;\"><div style=\"font-size:24px;font-weight:800;color:#7C4FB0;\">Place (Tempat)<\u002Fdiv><div style=\"font-size:20px;color:#6A4693;\">jawab \"di mana?\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">The children play <strong style=\"color:#7C4FB0;\">outside<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— di luar.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\">Please sit <strong style=\"color:#7C4FB0;\">here<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— di sini.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">I looked <strong style=\"color:#7C4FB0;\">everywhere<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— di mana-mana.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\">He went <strong style=\"color:#7C4FB0;\">abroad<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— ke luar negeri.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">Come <strong style=\"color:#7C4FB0;\">inside<\u002Fstrong>! <span style=\"font-style:italic;color:#A99F8E;\">— ke dalam.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\">She stays <strong style=\"color:#7C4FB0;\">at home<\u002Fstrong>. <span style=\"font-style:italic;color:#A99F8E;\">— di rumah <em>(frasa keterangan tempat)<\u002Fem>.<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:12px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> <span style=\"font-size:23px;color:#5C4A1E;\">keduanya biasanya di <strong>akhir kalimat<\u002Fstrong>. Kalau dipakai bersama: <strong>Place dulu, baru Time<\u002Fstrong> — \"She studied <strong>at home<\u002Fstrong> <strong>yesterday<\u002Fstrong>.\"<\u002Fspan><\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:12px 22px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:23px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;\">Coba Yuk!<\u002Fspan> &nbsp;Susun: \"at the park / yesterday / they played\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 16px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:8px;font-size:22px;line-height:1.4;color:#2C3A2F;\">\"They played <strong>at the park<\u002Fstrong> <strong>yesterday<\u002Fstrong>.\" — Place lalu Time.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ADVERB 3 — FREQUENCY & DEGREE ============ -->\n<section data-label=\"Adverb: Frequency &amp; Degree\" data-speaker-notes=\"Detail jenis keempat dan kelima: frequency adverb menjelaskan seberapa sering, degree adverb menjelaskan seberapa kuat suatu sifat. Frequency punya posisi khusus, sebelum kata kerja utama tapi sesudah to be. Degree diletakkan sebelum adjective atau adverb yang diterangkan. Lihat skala frekuensi dari always sampai never.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:12px;\">\n    <div>\n      <span style=\"display:inline-block;background:#C1447E;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">ADVERB · FREQUENCY &amp; DEGREE<\u002Fspan>\n      <h2 style=\"font-size:48px;font-weight:800;margin:8px 0 0;\">Frequency &amp; Degree Adverb <span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:38px;color:#C1447E;\">— kekerapan &amp; tingkat (4/4)<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#EAF2FB;padding:10px 22px;\"><div style=\"font-size:24px;font-weight:800;color:#2A66A8;\">Frequency (Kekerapan)<\u002Fdiv><div style=\"font-size:20px;color:#3B6FA0;\">jawab \"seberapa sering?\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 20px 6px;background:#F4F8FC;border-bottom:1px solid #F0EBDF;\">\n          <div style=\"display:flex;justify-content:space-between;gap:4px;\"><span style=\"font-size:16px;font-weight:700;color:#1F4E80;\">always<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#2A66A8;\">usually<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#3B6FA0;\">often<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#5C87B5;\">sometimes<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#8AA9C4;\">rarely<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#9A4A42;\">never<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:4px;margin-top:2px;\"><span style=\"font-size:14px;color:#3B6FA0;\">100%<\u002Fspan><span style=\"font-size:14px;color:#3B6FA0;\">~90%<\u002Fspan><span style=\"font-size:14px;color:#3B6FA0;\">~70%<\u002Fspan><span style=\"font-size:14px;color:#3B6FA0;\">~50%<\u002Fspan><span style=\"font-size:14px;color:#3B6FA0;\">~10%<\u002Fspan><span style=\"font-size:14px;color:#9A4A42;\">0%<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:#7A9BC0;margin-top:3px;\">% = perkiraan seberapa sering dibanding waktu total<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">He <strong style=\"color:#2A66A8;\">always<\u002Fstrong> arrives early. <span style=\"font-style:italic;color:#A99F8E;\">— selalu.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F4F8FC;\"><span style=\"font-size:22px;color:#3D3A33;\">She is <strong style=\"color:#2A66A8;\">often<\u002Fstrong> late. <span style=\"font-style:italic;color:#A99F8E;\">— sering.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">They <strong style=\"color:#2A66A8;\">never<\u002Fstrong> complain. <span style=\"font-style:italic;color:#A99F8E;\">— tidak pernah.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#EAF2FB;padding:10px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:28px;color:#2A66A8;\">Posisi:<\u002Fspan> <span style=\"font-size:20px;color:#274660;\"><strong>sebelum<\u002Fstrong> kata kerja utama, <strong>sesudah<\u002Fstrong> to be.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#DDF0E1;padding:10px 22px;\"><div style=\"font-size:24px;font-weight:800;color:#357A47;\">Degree (Tingkat)<\u002Fdiv><div style=\"font-size:20px;color:#46805A;\">jawab \"seberapa?\"<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">This soup is <strong style=\"color:#357A47;\">very<\u002Fstrong> hot. <span style=\"font-style:italic;color:#A99F8E;\">— sangat.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F3FAF4;\"><span style=\"font-size:22px;color:#3D3A33;\">It's <strong style=\"color:#357A47;\">too<\u002Fstrong> expensive. <span style=\"font-style:italic;color:#A99F8E;\">— terlalu.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\">She's <strong style=\"color:#357A47;\">quite<\u002Fstrong> tired. <span style=\"font-style:italic;color:#A99F8E;\">— cukup.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;background:#F3FAF4;\"><span style=\"font-size:22px;color:#3D3A33;\">He's <strong style=\"color:#357A47;\">almost<\u002Fstrong> done. <span style=\"font-style:italic;color:#A99F8E;\">— hampir.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:auto;background:#DDF0E1;padding:10px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:28px;color:#357A47;\">Posisi:<\u002Fspan> <span style=\"font-size:20px;color:#2C5C39;\"><strong>sebelum<\u002Fstrong> adjective / adverb yang diterangkan.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:12px 22px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:23px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;\">Coba Yuk!<\u002Fspan> &nbsp;Posisi benar untuk \"always\": a) She always is happy &nbsp; b) She is always happy<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 16px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:8px;font-size:22px;line-height:1.4;color:#2C3A2F;\">b) She is always happy — frequency adverb setelah to be.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CLAUSE ============ -->\n<section data-label=\"Clause\" data-speaker-notes=\"Topik ketiga: clause atau klausa. Inilah bedanya dengan frasa: klausa SUDAH punya pasangan subjek dan kata kerja. Fungsinya dalam kalimat adalah menyampaikan satu kejadian atau satu ide. Ada dua jenis: independent clause yang lengkap dan bisa berdiri sendiri jadi kalimat, dan dependent clause yang diawali kata hubung seperti because atau when, sehingga butuh menempel pada induk kalimat.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 48px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#C9971A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 06 · CLAUSE<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Clause<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#C9971A;\">anak &amp; induk kalimat<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:26px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"background:#fff;border-top:5px solid #C9971A;border-radius:14px;padding:20px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#C9971A;margin-bottom:8px;\">APA ITU CLAUSE?<\u002Fdiv>\n          <p style=\"font-size:25px;line-height:1.45;margin:0;color:#3D3A33;\"><strong>Clause<\u002Fstrong> (klausa) = kelompok kata yang <strong>sudah punya subjek + kata kerja<\u002Fstrong>. Inilah beda utamanya dengan phrase.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:18px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:8px;\">FUNGSINYA DI KALIMAT<\u002Fdiv>\n          <p style=\"font-size:24px;line-height:1.45;margin:0;color:#3D3A33;\">Setiap klausa menyampaikan <strong>satu kejadian / satu ide<\u002Fstrong>. Kalimat dibangun dari satu atau beberapa klausa yang digabung.<\u002Fp>\n        <\u002Fdiv>\n        <details style=\"background:#FFF3BF;border-radius:10px;padding:16px 22px;box-shadow:0 6px 16px rgba(60,55,45,0.12);\">\n          <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;\">\n            <span style=\"font-size:24px;color:#5C4A1E;line-height:1.3;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;color:#9A6B12;\">Cara Cepat:<\u002Fspan> diawali <strong>Linking Word<\u002Fstrong> (kata hubung)? Itu <strong>Dependent<\u002Fstrong>.<\u002Fspan>\n            <span class=\"rv-btn\" style=\"flex:none;background:#9A6B12;color:#fff;font-weight:800;font-size:22px;padding:7px 14px;border-radius:8px;white-space:nowrap;\">contoh ▾<\u002Fspan>\n          <\u002Fsummary>\n          <div style=\"margin-top:12px;font-size:22px;color:#5C4A1E;line-height:1.35;\">Kata-kata di bawah ini adalah <strong>Linking Word<\u002Fstrong> (contoh kata hubung) — penanda yang mengawali dependent clause:<\u002Fdiv>\n          <div style=\"margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;\">\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Keterangan waktu<\u002Fdiv><div style=\"font-size:22px;color:#5C4A1E;\">when, while, after, before<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Sebab–akibat<\u002Fdiv><div style=\"font-size:22px;color:#5C4A1E;\">because, since, as, so that<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Syarat (condition)<\u002Fdiv><div style=\"font-size:22px;color:#5C4A1E;\">if, unless, as long as<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Relative pronoun<\u002Fdiv><div style=\"font-size:22px;color:#5C4A1E;\">who, which, that, whose<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#DCEAF6;border-radius:12px;padding:16px 20px;border-left:6px solid #2A66A8;\">\n          <div style=\"font-size:24px;font-weight:800;color:#2A66A8;\">Independent Clause (induk)<\u002Fdiv>\n          <div style=\"font-size:24px;color:#274660;line-height:1.4;margin-top:3px;\">Lengkap (S+V) &amp; maknanya utuh → <strong>bisa berdiri sendiri<\u002Fstrong> jadi kalimat.<\u002Fdiv>\n          <div style=\"font-size:24px;font-weight:700;background:#fff;color:#2A66A8;border-radius:8px;padding:8px 12px;margin-top:8px;\">\"She joined the grammar club.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FBE3E1;border-radius:12px;padding:16px 20px;border-left:6px solid #B23A30;\">\n          <div style=\"font-size:24px;font-weight:800;color:#B23A30;\">Dependent Clause (anak)<\u002Fdiv>\n          <div style=\"font-size:24px;color:#5C4A40;line-height:1.4;margin-top:3px;\">Diawali kata hubung → maknanya menggantung, <strong>butuh induk kalimat<\u002Fstrong>.<\u002Fdiv>\n          <div style=\"font-size:24px;font-weight:700;background:#fff;color:#B23A30;border-radius:8px;padding:8px 12px;margin-top:8px;\">\"Because she wanted to improve…\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#33302A;border-radius:12px;padding:16px 20px;color:#FBF7EE;\">\n          <div style=\"font-size:22px;font-weight:800;letter-spacing:1px;color:#C9B8A0;margin-bottom:8px;\">GABUNGAN 2 KLAUSA → 1 KALIMAT<\u002Fdiv>\n          <div style=\"font-size:24px;line-height:1.5;\"><span style=\"background:#FBE3E1;color:#B23A30;padding:1px 6px;border-radius:4px;font-weight:700;\">Because she wanted to improve<\u002Fspan> <span style=\"font-size:20px;color:#E0A39C;\">(DC)<\u002Fspan>, <span style=\"background:#DCEAF6;color:#2A66A8;padding:1px 6px;border-radius:4px;font-weight:700;\">she joined the club<\u002Fspan> <span style=\"font-size:20px;color:#9CC4E8;\">(IC)<\u002Fspan>.<\u002Fdiv>\n          <div style=\"font-size:22px;line-height:1.4;margin-top:8px;color:#D9D2C4;\">Anak kalimat (DC) menempel pada induk (IC). DC sendiri maknanya menggantung; setelah digabung induk, barulah menjadi <strong style=\"color:#fff;\">kalimat utuh<\u002Fstrong>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Tandai klausa: \"If you study hard, you will pass the exam.\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\">Dependent: <strong>If you study hard<\u002Fstrong> · Independent: <strong>you will pass the exam<\u002Fstrong>.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SENTENCE ============ -->\n<section data-label=\"Sentence\" data-speaker-notes=\"Topik ketujuh: sentence atau kalimat. Sekarang kita rangkai klausa-klausa tadi. Ingat istilah IC, singkatan dari Independent Clause yaitu klausa lengkap yang bisa berdiri sendiri; dan DC, Dependent Clause atau anak kalimat. Triknya: hitung klausanya. Satu IC itu simple. Dua IC disambung FANBOYS itu compound. IC plus DC itu complex.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 07 · SENTENCE<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Sentence<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#4FA15B;\">empat tipe kalimat<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:12px;\">\n        <div style=\"background:#DCEAF6;border-radius:10px;padding:10px 16px;text-align:center;\"><div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">IC<\u002Fdiv><div style=\"font-size:20px;color:#3B6FA0;\">Independent Clause<br>= klausa lengkap, berdiri sendiri<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FBE3E1;border-radius:10px;padding:10px 16px;text-align:center;\"><div style=\"font-size:26px;font-weight:800;color:#B23A30;\">DC<\u002Fdiv><div style=\"font-size:20px;color:#9A4A42;\">Dependent Clause<br>= anak kalimat, butuh induk<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-top:5px solid #4FA15B;border-radius:14px;padding:16px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <p style=\"font-size:24px;line-height:1.4;margin:0;color:#3D3A33;\"><strong>Sentence<\u002Fstrong> = gabungan satu/lebih <strong>clause<\u002Fstrong> jadi ide lengkap. Tipenya ditentukan oleh <strong>jumlah &amp; jenis klausa<\u002Fstrong>. <span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">&nbsp;Cara cepat: hitung klausanya!<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0;\">\n      <div style=\"background:#DDF0E1;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#357A47;\">SIMPLE<\u002Fspan><span style=\"background:#357A47;color:#fff;font-size:20px;font-weight:700;padding:3px 10px;border-radius:14px;\">1 IC<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:24px;color:#2C5C39;margin-top:6px;\">Satu klausa lengkap saja.<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:24px;color:#3D3A33;\">\"<span style=\"color:#357A47;font-weight:700;\">I study English.<\u002Fspan>\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#DCEAF6;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#2A66A8;\">COMPOUND<\u002Fspan><span style=\"background:#2A66A8;color:#fff;font-size:20px;font-weight:700;padding:3px 10px;border-radius:14px;\">IC + IC<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:24px;color:#1F4E80;margin-top:6px;\">Dua IC disambung FANBOYS (and, but…).<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:24px;color:#3D3A33;\">\"<span style=\"color:#2A66A8;font-weight:700;\">I study,<\u002Fspan> and <span style=\"color:#2A66A8;font-weight:700;\">she reads.<\u002Fspan>\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FBF0D6;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#9A6B12;\">COMPLEX<\u002Fspan><span style=\"background:#9A6B12;color:#fff;font-size:20px;font-weight:700;padding:3px 10px;border-radius:14px;\">IC + DC<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:24px;color:#6E4E0E;margin-top:6px;\">Satu induk + satu anak kalimat.<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:24px;color:#3D3A33;\">\"<span style=\"color:#B23A30;font-weight:700;\">When she comes,<\u002Fspan> <span style=\"color:#9A6B12;font-weight:700;\">we start.<\u002Fspan>\"<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FBE3E1;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#B23A30;\">COMPOUND-COMPLEX<\u002Fspan><span style=\"background:#B23A30;color:#fff;font-size:19px;font-weight:700;padding:3px 10px;border-radius:14px;\">2 IC + DC<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:24px;color:#7F2A22;margin-top:6px;\">Dua induk + minimal satu anak kalimat.<\u002Fdiv>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:22px;color:#3D3A33;\">\"<span style=\"color:#B23A30;font-weight:700;\">She studies<\u002Fspan> and <span style=\"color:#B23A30;font-weight:700;\">practices<\u002Fspan> because <span style=\"color:#9A6B12;font-weight:700;\">she wants to be fluent.<\u002Fspan>\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!<\u002Fspan> &nbsp;Klasifikasikan: \"Although it was raining, they played, and everyone had fun.\"<\u002Fspan>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →<\u002Fspan>\n      <\u002Fsummary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>Compound-Complex<\u002Fstrong> — 1 DC (\"Although it was raining\") + 2 IC (\"they played\" + \"everyone had fun\").<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 12. TENSE OVERVIEW (BAGAN) ============ -->\n<section data-label=\"Tense: Bagan\" data-speaker-notes=\"Topik kedelapan: tense. Sebelum detail, pahami bagan besar ini dulu. Tense menjawab dua hэал: KAPAN—present, past, atau future; dan BAGAIMANA—simple, continuous, atau perfect. Lihat garis waktu: past di kiri, now di tengah, future di kanan. Lalu tabel tiga kali tiga menunjukkan kombinasinya. Inilah peta yang akan kita isi di slide berikutnya.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:64px 80px 44px 168px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#9B5FC0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 08 · TENSE<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Peta Besar Tense<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#9B5FC0;\">kapan? &amp; bagaimana?<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;padding:24px 30px 30px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#9B5FC0;margin-bottom:18px;\">GARIS WAKTU — KAPAN KEJADIANNYA?<\u002Fdiv>\n      <div style=\"position:relative;height:96px;margin:0 10px;\">\n        <div style=\"position:absolute;top:46px;left:0;right:0;height:4px;background:#D9D2C4;border-radius:2px;\"><\u002Fdiv>\n        <div style=\"position:absolute;top:30px;left:14%;width:36px;height:36px;border-radius:50%;background:#3B82C4;transform:translateX(-50%);\"><\u002Fdiv>\n        <div style=\"position:absolute;top:24px;left:50%;width:48px;height:48px;border-radius:50%;background:#9B5FC0;transform:translateX(-50%);box-shadow:0 0 0 8px rgba(155,95,192,0.18);\"><\u002Fdiv>\n        <div style=\"position:absolute;top:30px;left:86%;width:36px;height:36px;border-radius:50%;background:#4FA15B;transform:translateX(-50%);\"><\u002Fdiv>\n        <div style=\"position:absolute;top:74px;left:14%;transform:translateX(-50%);font-size:24px;font-weight:800;color:#2A66A8;\">PAST<\u002Fdiv>\n        <div style=\"position:absolute;top:78px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:800;color:#7C4FB0;white-space:nowrap;\">Now (present)<\u002Fdiv>\n        <div style=\"position:absolute;top:74px;left:86%;transform:translateX(-50%);font-size:24px;font-weight:800;color:#357A47;\">FUTURE<\u002Fdiv>\n        <div style=\"position:absolute;top:2px;left:14%;transform:translateX(-50%);font-size:21px;color:#7A746A;font-style:italic;\">\"yesterday\"<\u002Fdiv>\n        <div style=\"position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:21px;color:#7A746A;font-style:italic;\">\"now / today\"<\u002Fdiv>\n        <div style=\"position:absolute;top:2px;left:86%;transform:translateX(-50%);font-size:21px;color:#7A746A;font-style:italic;\">\"tomorrow\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:1px;color:#9B5FC0;margin-bottom:12px;\">CARA BACA TABEL: pilih BARIS dulu (kapan?) → lalu KOLOM (bentuknya?)<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr;gap:10px;flex:1;\">\n        <details style=\"position:relative;background:#33302A;border-radius:8px;color:#FBF7EE;cursor:pointer;\">\n          <summary style=\"height:100%;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;gap:3px;\">\n            <div style=\"font-size:21px;font-weight:800;color:#C9A8E4;\">→ BENTUK<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:800;color:#9CC4E8;\">↓ WAKTU<\u002Fdiv>\n            <div style=\"font-size:17px;color:#C9B8A0;\">klik: arti ▾<\u002Fdiv>\n          <\u002Fsummary>\n          <div style=\"position:absolute;top:100%;left:0;z-index:5;width:330px;background:#33302A;color:#FBF7EE;border-radius:8px;padding:12px 16px;margin-top:6px;font-size:21px;line-height:1.45;box-shadow:0 8px 20px rgba(0,0,0,0.28);\"><strong style=\"color:#C9A8E4;\">Kolom = BENTUK<\u002Fstrong> (bagaimana aksinya): simple, continuous, perfect.<br><strong style=\"color:#9CC4E8;\">Baris = WAKTU<\u002Fstrong> (kapan terjadi): present, past, future.<\u002Fdiv>\n        <\u002Fdetails>\n        <div style=\"background:#DDF0E1;border-radius:8px;padding:8px;text-align:center;font-size:24px;font-weight:800;color:#357A47;\">SIMPLE<br><span style=\"font-weight:600;font-size:19px;color:#46805A;\">rutin / fakta<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#F0E4F7;border-radius:8px;padding:8px;text-align:center;font-size:24px;font-weight:800;color:#7C4FB0;\">CONTINUOUS<br><span style=\"font-weight:600;font-size:19px;color:#8A5FA8;\">sedang berlangsung<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#FBF0D6;border-radius:8px;padding:8px;text-align:center;font-size:24px;font-weight:800;color:#9A6B12;\">PERFECT<br><span style=\"font-weight:600;font-size:19px;color:#A87E2E;\">sudah selesai<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#DCEAF6;border-radius:8px;padding:8px 12px;font-weight:800;color:#2A66A8;display:flex;flex-direction:column;justify-content:center;\"><span style=\"font-size:24px;\">PRESENT<\u002Fspan><span style=\"font-size:19px;font-weight:600;color:#3B6FA0;\">sekarang<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I study<\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I am studying<\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I have studied<\u002Fdiv>\n        <div style=\"background:#FBE3E1;border-radius:8px;padding:8px 12px;font-weight:800;color:#B23A30;display:flex;flex-direction:column;justify-content:center;\"><span style=\"font-size:24px;\">PAST<\u002Fspan><span style=\"font-size:19px;font-weight:600;color:#9A4A42;\">lampau<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I studied<\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I was studying<\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I had studied<\u002Fdiv>\n        <div style=\"background:#EFEAFB;border-radius:8px;padding:8px 12px;font-weight:800;color:#6B4FB0;display:flex;flex-direction:column;justify-content:center;\"><span style=\"font-size:24px;\">FUTURE<\u002Fspan><span style=\"font-size:19px;font-weight:600;color:#8A5FA8;\">nanti / akan<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I will study<\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I will be studying<\u002Fdiv>\n        <div style=\"background:#F7FAF8;border-radius:8px;padding:10px 12px;font-size:22px;color:#3D3A33;display:flex;align-items:center;\">I will have studied<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:12px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara baca:<\u002Fspan> <span style=\"font-size:24px;color:#5C4A1E;\">tentukan dulu <strong>kapan<\u002Fstrong> (baris), lalu <strong>bagaimana<\u002Fstrong> (kolom). 3 slide berikut mengisi tiap baris lengkap dengan versi +, −, ?.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 13. PRESENT TENSE ============ -->\n<section data-label=\"Present Tense\" data-speaker-notes=\"Present tense—kejadian sekarang. Tiga bentuk. Simple present untuk rutin atau fakta: tambah s untuk he she it. Present continuous untuk yang sedang berlangsung: am, is, are plus V-ing. Present perfect untuk yang sudah selesai tapi terhubung sekarang: have atau has plus V3. Perhatikan tiga kolom: positif, negatif, dan tanya untuk tiap bentuk.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:48px 76px 28px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:6px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#2A66A8;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TENSE · PRESENT<\u002Fspan>\n        <h2 style=\"font-size:48px;font-weight:800;margin:8px 0 0;\">Present Tense <span style=\"font-family:'Caveat',cursive;font-weight:700;font-size:38px;color:#2A66A8;\">— masa kini<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"background:#DCEAF6;border-radius:10px;padding:10px 18px;font-size:24px;color:#1F4E80;\">Penanda: <em>e
