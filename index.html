:22px;color:#5C5448;line-height:1.35;margin-top:3px;\">Present · Past · Future (S/C/P)<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:26px;background:#EAF6EC;border-left:6px solid #4FA15B;border-radius:14px;padding:22px 30px;\">\n    <span style=\"font-family:'Caveat',cursive;font-size:36px;color:#2F6B3D;\">Kunci utama:<\u002Fspan> <span style=\"font-size:25px;color:#2C3A2F;line-height:1.5;\">kuasai blok-blok dasar ini dulu — kata, klausa, dan urutannya — sebelum melangkah ke materi lanjutan di Level 2.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Glosarium: Pronoun (1/2)\" data-speaker-notes=\"Glosarium pronoun bagian pertama. Personal pronoun bentuk subjek ke objek, dan possessive dari adjective ke pronoun. Referensi cepat untuk hafalan.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#2FA0A0;color:#fff;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">GLOSARIUM · 1 dari 5<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:48px;font-weight:800;margin:0;\">Pronoun<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:32px;color:#2FA0A0;\">personal &amp; possessive<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:10px;background:#FFF3BF;border-radius:8px;padding:8px 20px;display:inline-block;\"><span style=\"font-size:19px;color:#5C4A1E;\"><strong>Cara baca:<\u002Fstrong> \"kata A → kata B\" artinya kata A dipakai sebagai <strong>subjek<\u002Fstrong>, lalu berubah jadi kata B saat jadi <strong>objek<\u002Fstrong> (atau kepunyaan). Contoh kalimat lengkap ada di topik Pronoun sebelumnya.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#E0F1F1;padding:12px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#1E7878;\">Personal (Subjek → Objek)<\u002Fdiv><div style=\"font-size:21px;color:#1E7878;opacity:0.8;\">7 kata inti<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>I → me<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— saya<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>you → you<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— kamu<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>he → him<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— dia (laki-laki)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>she → her<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— dia (perempuan)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>it → it<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— benda / hewan<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>we → us<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— kami / kita<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>they → them<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— mereka<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#E0F1F1;padding:12px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#1E7878;\">Possessive (Adjective → Pronoun)<\u002Fdiv><div style=\"font-size:19px;color:#1E7878;opacity:0.85;line-height:1.3;\">adj + benda (\"my book\") vs berdiri sendiri (\"it's mine\")<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>my → mine<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— milik saya<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>your → yours<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— milikmu<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>his → his<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— miliknya (L)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>her → hers<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— miliknya (P)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>our → ours<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— milik kami<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>their → theirs<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— milik mereka<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Glosarium: Pronoun (2/2)\" data-speaker-notes=\"Glosarium pronoun bagian kedua. Reflexive pronoun untuk diri sendiri, demonstrative untuk menunjuk, dan relative untuk menyambung keterangan.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:60px 76px 40px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#2FA0A0;color:#fff;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">GLOSARIUM · 2 dari 5<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:48px;font-weight:800;margin:0;\">Pronoun<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:32px;color:#2FA0A0;\">reflexive, demonstrative &amp; relative<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:10px;background:#FFF3BF;border-radius:8px;padding:8px 20px;display:inline-block;\"><span style=\"font-size:19px;color:#5C4A1E;\"><strong>Cara baca:<\u002Fstrong> Reflexive = bentuk tunggal (tanpa arrow), untuk \"diri sendiri\". Demonstrative &amp; Relative kolom kanan sengaja digabung agar hemat tempat — lihat label kecilnya untuk membedakan.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#E0F1F1;padding:12px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#1E7878;\">Reflexive<\u002Fdiv><div style=\"font-size:21px;color:#1E7878;opacity:0.8;\">diri sendiri<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>myself<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— diriku<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>yourself<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— dirimu<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>himself / herself<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— dirinya<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>itself<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— dirinya (benda)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>ourselves<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— diri kami<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:11px 22px;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>themselves<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— diri mereka<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#E0F1F1;padding:12px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#1E7878;\">Demonstrative &amp; Relative<\u002Fdiv><div style=\"font-size:21px;color:#1E7878;opacity:0.8;\">menunjuk &amp; menyambung<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:4px 22px 3px;background:#F0EBDF;font-size:15px;font-weight:800;letter-spacing:1px;color:#7A746A;\">DEMONSTRATIVE — menunjuk benda<\u002Fdiv>\n        <div style=\"padding:9px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>this / that<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ini / itu (tunggal)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:9px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>these / those<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ini / itu (jamak)<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:4px 22px 3px;background:#F0EBDF;font-size:15px;font-weight:800;letter-spacing:1px;color:#7A746A;\">RELATIVE — menyambung keterangan<\u002Fdiv>\n        <div style=\"padding:9px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>who<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— orang (subjek)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:9px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>whom<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— orang (objek)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:9px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>whose<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— kepunyaan<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:9px 22px;flex:1;display:flex;align-items:center;background:#F7FBFB;\"><span style=\"font-size:23px;color:#3D3A33;\"><strong>which / that<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— benda<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Glosarium: Conjunction (1/2)\" data-speaker-notes=\"Glosarium conjunction bagian pertama. FANBOYS untuk coordinating, dan lima pasangan correlative.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans- iv style=\"background:#F1EAFA;padding:10px 22px;\"><div style=\"font-size:25px;font-weight:800;color:#7C4FB0;\">Place (Tempat)<\u002Fdiv><div style=\"font-size:20px;color:#7C4FB0;opacity:0.8;\">9 kata tersering<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>here<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di sini<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>there<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di situ<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>outside<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di luar<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>inside<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di dalam<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>everywhere<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di mana-mana<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>abroad<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ke luar negeri<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>nearby<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di dekat sini<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F8F4FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>upstairs<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di lantai atas<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>somewhere<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di suatu tempat<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#EAF2FB;padding:10px 22px;\"><div style=\"font-size:25px;font-weight:800;color:#2A66A8;\">Frequency (Kekerapan)<\u002Fdiv><div style=\"font-size:20px;color:#2A66A8;opacity:0.8;\">skala 100% → 0%<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>always<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— 100% — selalu<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F4F8FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>usually<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~90% — biasanya<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>often<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~70% — sering<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F4F8FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>frequently<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~65% — kerap kali<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>sometimes<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~50% — kadang<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F4F8FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>occasionally<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~30% — sesekali<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>rarely<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~10% — jarang<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F4F8FC;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>seldom<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— ~5% — nyaris tak pernah<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>never<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— 0% — tidak pernah<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Glosarium: Adverb (3/3)\" data-speaker-notes=\"Glosarium adverb bagian ketiga. Degree untuk tingkat dengan sembilan kata, plus ringkasan kelima jenis adverb sebagai penutup glosarium.\" style=\"position:relative;background:#FBF7EE;color:#33302A;font-family:'Nunito',sans-serif;overflow:hidden;padding:56px 76px 36px 164px;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 56px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:14px;\">\n    <div>\n      <span style=\"display:inline-block;background:#C1447E;color:#fff;font-weight:800;font-size:22px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">GLOSARIUM · 5 dari 5<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:44px;font-weight:800;margin:0;\">Adverb<\u002Fh2><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#C1447E;\">degree &amp; ringkasan<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#DDF0E1;padding:10px 22px;\"><div style=\"font-size:25px;font-weight:800;color:#357A47;\">Degree (Tingkat)<\u002Fdiv><div style=\"font-size:20px;color:#357A47;opacity:0.8;\">9 kata tersering<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>very<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— sangat<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F3FAF4;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>too<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— terlalu<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>quite<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— cukup<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F3FAF4;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>almost<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— hampir<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>enough<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— cukup (setelah kata)<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F3FAF4;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>extremely<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— amat sangat<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>fairly<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— lumayan<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F3FAF4;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>barely<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— nyaris tidak<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>completely<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— sepenuhnya<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#F0EEE6;padding:10px 22px;\"><div style=\"font-size:25px;font-weight:800;color:#5C5448;\">Ringkasan 5 Jenis Adverb<\u002Fdiv><div style=\"font-size:20px;color:#5C5448;opacity:0.8;\">satu pertanyaan kunci per jenis<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>Manner<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— bagaimana?<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7F6F1;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>Time<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— kapan?<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>Place<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— di mana?<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;border-bottom:1px solid #F0EBDF;flex:1;display:flex;align-items:center;background:#F7F6F1;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>Frequency<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— seberapa sering?<\u002Fspan><\u002Fspan><\u002Fdiv><div style=\"padding:8px 22px;flex:1;display:flex;align-items:center;\"><span style=\"font-size:22px;color:#3D3A33;\"><strong>Degree<\u002Fstrong> <span style=\"font-style:italic;color:#8A8377;\">— seberapa?<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 23. PENUTUP ============ -->\n<section data-label=\"Penutup\" data-speaker-notes=\"Itu dia Level 1. Kuncinya satu: latihan rutin. Buka materi ini kapan saja kamu butuh, kerjakan lagi soal-soalnya, dan sampai jumpa di Level 2. Selamat belajar.\" style=\"position:relative;background:#9B5FC0;background-image:linear-gradient(135deg,#9B5FC0,#7C4FB0);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;\">\n  <div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(255,255,255,0.20) 6.5px,rgba(255,255,255,0.08) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 80px;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:rgba(255,255,255,0.35);\"><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px 80px 172px;\">\n    <div style=\"font-family:'Caveat',cursive;font-size:64px;line-height:1;opacity:0.92;\">terus berlatih, ya!<\u002Fdiv>\n    <h2 style=\"font-size:104px;font-weight:800;margin:6px 0 18px;letter-spacing:-1px;\">Sampai Jumpa!<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.55;max-width:1000px;opacity:0.95;margin:0 0 40px;\">Latihan tiap hari membuat grammar makin lancar. Buka materi ini kapan saja, ulangi soal-soalnya, lalu lanjut ke <strong>Level 2: tenses lanjutan &amp; kalimat kompleks<\u002Fstrong>.<\u002Fp>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n      <span style=\"background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.4);padding:12px 22px;border-radius:30px;font-size:24px;font-weight:700;\">Practice makes perfect<\u002Fspan>\n      <span style=\"background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,
